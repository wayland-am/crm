<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wayland CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--sur:#ffffff;--sur2:#f1f5f9;
  --bdr:#e2e8f0;--bdr2:#cbd5e1;
  --text:#0f172a;--text-m:#64748b;--text-l:#94a3b8;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-dk:#1d4ed8;
  --green:#16a34a;--green-lt:#f0fdf4;
  --red:#dc2626;--red-lt:#fef2f2;
  --amber:#d97706;--amber-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --gray:#6b7280;
  --radius:8px;--radius-lg:12px;--radius-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --sidebar:220px;--topbar:52px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg);height:100vh;overflow:hidden;display:flex}

/* ── Sidebar ── */
#sidebar{width:var(--sidebar);background:var(--text);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
#sidebar-logo{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.1)}
#sidebar-logo img{height:28px}
#sidebar-logo-text{color:#fff;font-weight:700;font-size:15px}
.nav-section{padding:8px 0}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:rgba(255,255,255,.35);padding:8px 16px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;color:rgba(255,255,255,.65);cursor:pointer;border-radius:0;transition:all .15s;font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.15)}
.nav-item i{font-size:16px;width:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.nav-badge.blue{background:var(--blue)}
#sidebar-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto;display:flex;align-items:center;gap:10px;cursor:pointer}
#sidebar-user:hover{background:rgba(255,255,255,.05)}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}

/* ── Main area ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:var(--topbar);background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#topbar-title{font-size:15px;font-weight:700;color:var(--text)}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#content{flex:1;overflow-y:auto;padding:20px}

/* ── Search ── */
#search-wrap{position:relative;flex:1;max-width:380px}
#search-input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--bdr);border-radius:var(--radius);background:var(--bg);font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
#search-input:focus{border-color:var(--blue);background:#fff}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-l);font-size:15px}
#search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--bdr);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:1000;max-height:400px;overflow-y:auto;display:none}
.sr-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg)}
.sr-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-l);width:60px;flex-shrink:0}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:500;border:1px solid var(--bdr);background:#fff;color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn:hover{background:var(--bg);border-color:var(--bdr2)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dk);border-color:var(--blue-dk)}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--bg);border-color:var(--bdr)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:7px;border-radius:var(--radius)}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--bdr);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.card-header{padding:14px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.card-body{padding:16px}

/* ── Avatar ── */
.av{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.av-blue{background:var(--blue-lt);color:var(--blue)}
.av-green{background:var(--green-lt);color:var(--green)}
.av-purple{background:var(--purple-lt);color:var(--purple)}
.av-amber{background:var(--amber-lt);color:var(--amber)}
.av-gray{background:var(--sur2);color:var(--gray)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:var(--blue-lt);color:var(--blue)}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-red{background:var(--red-lt);color:var(--red)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.badge-gray{background:var(--sur2);color:var(--gray)}
.badge-purple{background:var(--purple-lt);color:var(--purple)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);background:var(--bg);border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg)}
.tbl-clickable tr{cursor:pointer}

/* ── Form ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-m);margin-bottom:5px}
.fc{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:var(--radius);font-size:13px;color:var(--text);background:#fff;outline:none;transition:border-color .15s;font-family:var(--font)}
.fc:focus{border-color:var(--blue)}
.fc:disabled{background:var(--bg);color:var(--text-m)}
textarea.fc{resize:vertical;min-height:72px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:520px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column}
.modal-lg{width:680px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{border:none;background:none;cursor:pointer;color:var(--text-m);font-size:20px;padding:2px;border-radius:4px;display:flex;line-height:1}
.modal-close:hover{color:var(--text);background:var(--bg)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* ── Pipeline Kanban ── */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;height:100%}
.kanban::-webkit-scrollbar{height:6px}
.kanban::-webkit-scrollbar-track{background:transparent}
.kanban::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.k-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sur2);border-radius:var(--radius-lg);overflow:hidden}
.k-head{padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;border-bottom:1px solid var(--bdr)}
.k-stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.k-count{margin-left:auto;font-size:11px;color:var(--text-m);font-weight:500}
.k-val{font-size:11px;color:var(--text-m)}
.k-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.k-cards::-webkit-scrollbar{width:4px}
.k-cards::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.k-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--radius);padding:10px 12px;cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.k-card:hover{box-shadow:var(--shadow-md);border-color:var(--bdr2)}
.k-card-co{font-weight:600;font-size:13px;margin-bottom:2px}
.k-card-model{font-size:12px;color:var(--text-m);margin-bottom:6px}
.k-card-amount{font-size:13px;font-weight:700;color:var(--blue)}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-l)}
.k-card-stale{color:var(--red)}
.k-drop-zone{border:2px dashed var(--bdr);border-radius:var(--radius);padding:12px;text-align:center;font-size:12px;color:var(--text-l);transition:all .15s}
.k-drop-zone.drag-over{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}

/* ── Company card layout ── */
.co-layout{display:grid;grid-template-columns:320px 1fr 280px;gap:0;height:100%;overflow:hidden}
.co-left{border-right:1px solid var(--bdr);overflow-y:auto;background:#fff}
.co-center{overflow-y:auto;background:var(--bg)}
.co-right{border-left:1px solid var(--bdr);overflow-y:auto;background:#fff}
.co-section{padding:16px;border-bottom:1px solid var(--bdr)}
.co-section:last-child{border-bottom:none}
.co-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-l);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* ── Activity feed ── */
.act-feed{padding:16px;display:flex;flex-direction:column;gap:1px}
.act-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.act-item:last-child{border-bottom:none}
.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.act-icon.call{background:#eff6ff;color:var(--blue)}
.act-icon.meeting{background:#f0fdf4;color:var(--green)}
.act-icon.email{background:#faf5ff;color:var(--purple)}
.act-icon.whatsapp{background:#f0fdf4;color:#25d366}
.act-icon.proposal{background:#fffbeb;color:var(--amber)}
.act-icon.other{background:var(--sur2);color:var(--gray)}
.act-meta{font-size:11px;color:var(--text-l);margin-bottom:4px}
.act-text{font-size:13px;color:var(--text);line-height:1.5}
.act-outcome{background:var(--bg);border-radius:var(--radius);padding:8px 10px;font-size:12px;color:var(--text-m);margin-top:6px;border-left:3px solid var(--bdr2)}

/* ── Log activity CTA ── */
.log-cta{margin:16px;background:var(--blue-lt);border:1px dashed #93c5fd;border-radius:var(--radius-lg);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s}
.log-cta:hover{background:#dbeafe;border-color:var(--blue)}
.log-cta-text{font-size:13px;color:var(--blue);font-weight:500}
.log-cta-sub{font-size:11px;color:#60a5fa}

/* ── Dashboard ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.metric-card{background:#fff;border:1px solid var(--bdr);border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.metric-card.green::before{background:var(--green)}
.metric-card.red::before{background:var(--red)}
.metric-card.amber::before{background:var(--amber)}
.metric-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);margin-bottom:6px}
.metric-value{font-size:24px;font-weight:800;color:var(--text);line-height:1}
.metric-sub{font-size:11px;color:var(--text-l);margin-top:4px}

/* ── Today tasks (Dashboard) ── */
.today-task{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.today-task:hover{background:var(--bg);margin:0 -12px;padding:10px 12px}
.today-task:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border:2px solid var(--bdr2);border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.task-check:hover{border-color:var(--blue)}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.task-co{font-size:12px;color:var(--blue);margin-top:1px}
.task-due{font-size:11px;color:var(--text-l);margin-left:auto;white-space:nowrap;padding-left:8px}
.task-due.overdue{color:var(--red);font-weight:600}
.task-due.today{color:var(--amber);font-weight:600}

/* ── Tags & Pills ── */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid transparent}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:0}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text-m)}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.3}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:16px}

/* ── Checkbox ── */
.cb{width:16px;height:16px;border:1.5px solid var(--bdr2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.cb:hover{border-color:var(--blue)}
.cb.checked{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Status colors ── */
.status-active{color:var(--green)}
.status-prospect{color:var(--blue)}
.status-negotiating{color:var(--amber)}
.status-inactive{color:var(--gray)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:var(--radius-lg);font-size:13px;box-shadow:var(--shadow-lg);z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;max-width:320px}
#toast.show{opacity:1;transform:translateY(0)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray)}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* ── Responsive ── */
@media(max-width:768px){
  .mobile-stage-btns{display:flex!important}
  .kanban{scroll-snap-type:x mandatory}
  .k-col{scroll-snap-align:start;min-width:260px}
  :root{--sidebar:0px}
  #sidebar{position:fixed;left:-220px;top:0;bottom:0;width:220px;z-index:200;transition:left .25s}
  #sidebar.open{left:0}
  #mobile-menu-btn{display:flex!important}
  /* Dashboard */
  .dash-main{grid-template-columns:1fr!important}
  .dash-metrics{grid-template-columns:1fr 1fr!important}
  /* Company card */
  .co-layout{grid-template-columns:1fr!important;grid-template-rows:auto}
  .co-left{border-right:none;border-bottom:1px solid var(--bdr)}
  .co-center{order:2}
  .co-right{border-left:none;border-top:1px solid var(--bdr)}
  /* Pipeline */
  .pipe-summary{overflow-x:auto}
  .pipe-stage-stat{min-width:90px}
  /* Content padding */
  #content{padding:12px}
  /* Modal */
  .modal{width:95vw!important;margin:16px}
  .fr{grid-template-columns:1fr!important}
  .f3{grid-template-columns:1fr!important}
  /* Topbar */
  #search-wrap{max-width:none;flex:1}
  #topbar-right .btn:not(:last-child){display:none}
  #topbar-right .btn:last-child{display:inline-flex}
  /* Table scroll */
  .card{overflow-x:auto}
}

/* ── Row actions ── */
tr:hover .row-actions{opacity:1!important}

/* ── Drag & Drop ── */
.dragging{opacity:.5;cursor:grabbing}
.drag-handle{cursor:grab;color:var(--text-l)}
.drop-target{background:var(--blue-lt)!important;border-color:var(--blue)!important}

/* ── Pipeline summary bar ── */
.pipe-summary{display:flex;gap:0;background:#fff;border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.pipe-stage-stat{flex:1;padding:12px 16px;border-right:1px solid var(--bdr);text-align:center}
.pipe-stage-stat:last-child{border-right:none}
.pipe-stage-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-m)}
.pipe-stage-count{font-size:20px;font-weight:800;margin:4px 0}
.pipe-stage-val{font-size:11px;color:var(--text-l)}
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="background:#fff;border-radius:20px;padding:40px;width:380px;box-shadow:0 25px 50px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:28px;font-weight:900;color:#0f172a;letter-spacing:-1px">Wayland<span style="color:#2563eb">CRM</span></div>
      <div style="font-size:13px;color:#64748b;margin-top:4px">Armenia · Mining & Construction</div>
    </div>
    <div style="margin-bottom:14px">
      <label class="fl">Name</label>
      <input class="fc" id="l-name" placeholder="Your name" autocomplete="name">
    </div>
    <div style="margin-bottom:20px">
      <label class="fl">Password</label>
      <input class="fc" id="l-pass" type="password" placeholder="••••••" autocomplete="current-password">
    </div>
    <div id="l-err" style="color:#dc2626;font-size:12px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px" onclick="doLogin()">
      <i class="ti ti-login"></i> Sign In
    </button>
    <div style="text-align:center;margin-top:16px;font-size:12px;color:#94a3b8">
      Or paste your API URL below to connect
    </div>
    <input class="fc" id="l-api" placeholder="https://script.google.com/macros/s/.../exec" style="margin-top:8px;font-size:11px">
    <button class="btn" style="width:100%;justify-content:center;margin-top:8px;font-size:12px" onclick="connectApi()">
      <i class="ti ti-plug"></i> Connect
    </button>
  </div>
</div>

<!-- ═══ APP SHELL ═══ -->
<div id="app" style="display:none;width:100%;height:100%;overflow:hidden;display:flex">

  <!-- SIDEBAR -->
  <nav id="sidebar">

<script>
'use strict';

// ═══════════════════════════════════════════════════════════

const CLOUDINARY_CLOUD = 'datwudgmo';

const MAPTILER_KEY = 'ag2mYxKqDIOXJAKnt58I';

const STAGE_COLOR = {Lead:'#6b7280',Qualified:'#8b5cf6',Proposal:'#f59e0b',Negotiation:'#3b82f6',Won:'#22c55e',Lost:'#ef4444',Disqualified:'#9ca3af'};

const CO_CATS = {

const ACT_CLASS = {Call:'call',Meeting:'meeting',WhatsApp:'whatsapp',Email:'email',Proposal:'proposal',Demo:'proposal',Visit:'meeting',Other:'other'};

const INDUSTRIES = ['Mining / Quarry','Construction','Road Construction','Quarrying','Infrastructure','Industry','Agriculture','Other'];
const CO_STATUSES = ['Prospect','Active','Negotiating','Partner','Inactive','Cold'];

const ALL_BRANDS = ['Hitachi','Epiroc','Normet','Genie','Atlas Copco','Ingersoll Rand','Caterpillar','Komatsu','Volvo','Liebherr','Doosan','John Deere','Hyundai','Sany','XCMG','Other'];
const BRAND_COLOR = {Hitachi:'#185FA5',Caterpillar:'#EF9F27',Komatsu:'#E24B4A',Volvo:'#1D9E75',Liebherr:'#7F77DD',Doosan:'#D4537E','John Deere':'#639922',Hyundai:'#D85A30',Sany:'#888780',XCMG:'#534AB7'};

const LOST_REASONS = ['Price too high','Chose competitor','Budget cut','No budget','Project cancelled','No response','Bought used equipment','Technical mismatch','Other'];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let API = localStorage.getItem('wcrm_url') || DEFAULT_API;
let db = {companies:[],contacts:[],deals:[],tasks:[],activities:[],fleet:[],locations:[],photos:[],contracts:[],leads:[],users:[],agents:[],automations:[]};
let currentUser = null;
let currentPage = 'dashboard';
let modalType = null;
let modalId = null;
let modalCtx = {};
let _mapInstance = null;
let _calView = 'month';
let _calOffset = 0;
let _calCatFilter = new Set(['A','B','C','D','']);
let _mapStatusFilter = new Set(['Active','Prospect','Partner','Negotiating','Cold','Inactive']);
let _fleetShowComp = false;

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => { const d=new Date(); return [d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-'); };
const parseDate = s => { if(!s||typeof s!=='string')return null; const p=s.slice(0,10).split('-'); if(p.length<3)return null; return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])); };
const fmtDate = s => { const d=parseDate(s); if(!d||isNaN(d))return'—'; return d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}); };
const fmtDateShort = s => { const d=parseDate(s); if(!d||isNaN(d))return'—'; return d.toLocaleDateString('en',{day:'numeric',month:'short'}); };
const fmtUSD = n => { const v=Number(n)||0; if(v>=1000000)return'$'+(v/1000000).toFixed(1)+'M'; if(v>=1000)return'$'+(v/1000).toFixed(0)+'K'; return'$'+v.toLocaleString(); };
const ini = name => { if(!name)return'?'; const p=name.trim().split(/\s+/); return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); };
const avColor = name => { const colors=['av-blue','av-green','av-purple','av-amber']; let h=0; for(let c of (name||''))h=(h*31+c.charCodeAt(0))&0xffff; return colors[h%colors.length]; };
const dueFmt = due => { if(!due||due==='Invalid Date')return'<span style="color:var(--text-l)">No date</span>'; const t=today(); if(due<t)return'<span style="color:var(--red);font-weight:600">'+fmtDateShort(due)+'</span>'; if(due===t)return'<span style="color:var(--amber);font-weight:600">Today</span>'; return fmtDateShort(due)||'No date'; };
const timeAgo = s => { if(!s)return'—'; const d=new Date(s);if(isNaN(d))return'—'; const n=new Date(),diff=Math.floor((n-d)/1000); if(diff<60)return'just now'; if(diff<3600)return Math.floor(diff/60)+'m ago'; if(diff<86400)return Math.floor(diff/3600)+'h ago'; const days=Math.floor(diff/86400); if(days<7)return days+'d ago'; return fmtDateShort(s.slice?s.slice(0,10):s); };
const clamp = (v,min,max) => Math.min(Math.max(v,min),max);
const debounce = (fn,ms) => { let t; return (...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };
const AGENTS = () => (db.users&&db.users.length) ? db.users.filter(u=>String(u.active)!=='false').map(u=>u.name) : (currentUser?[currentUser.name]:[]);
const myDeals = () => currentUser?.role==='manager' ? db.deals : db.deals.filter(d=>d.agent===currentUser?.name);
const isActive = s => ACTIVE_STAGES.includes(s);

// Show toast
function toast(msg, ms=2800) {
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function apiCall(params, retries=2) {
  const url = API + '?payload=' + encodeURIComponent(JSON.stringify(params));
  for(let i=0; i<=retries; i++) {
    try {
      const r = await fetch(url, {signal: AbortSignal.timeout(15000)});
      const data = await r.json();
      if(!data.ok) throw new Error(data.error||'API error');
      return data.data;
    } catch(e) {
      if(i===retries) throw e;
      await new Promise(r=>setTimeout(r,1000*(i+1)));
    }
  }
}

async function persist(sheet, row) {
  if(!row.id) row.id = uid();
  await apiCall({action:'upsert', sheet, row});
  return row;
}

async function remove(sheet, id) {
  await apiCall({action:'delete', sheet, id});
}

// Load all data
async function loadAll() {
  const data = await apiCall({action:'readAll'});
  Object.keys(data).forEach(k => { if(db[k]!==undefined) db[k]=Array.isArray(data[k])?data[k]:[]; });
  normalizeDb();
  updateBadges();
}

function normalizeDb() {
  // Normalize booleans
  db.tasks = db.tasks.map(t => ({...t, done: t.done===true||t.done==='true'||t.done==='TRUE', auto_scheduled: t.auto_scheduled===true||t.auto_scheduled==='true'||t.auto_scheduled==='TRUE'}));
  db.users = db.users.map(u => ({...u, active: String(u.active)!=='false'&&u.active!=='FALSE'}));
  // Normalize amounts
  db.deals = db.deals.map(d => ({...d, amount: Number(d.amount)||0, probability: Number(d.probability)||0}));
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
function doLogin() {
  const name = $('l-name').value.trim();
  const pass = $('l-pass').value;
  if(!name) { showLoginErr('Enter your name'); return; }

  const user = db.users.find(u => u.name.toLowerCase()===name.toLowerCase() && (simpleHash(pass)===u.password_hash||pass===u.password_hash));
  if(!user) { showLoginErr('Wrong name or password'); return; }
  if(!user.active) { showLoginErr('Account is disabled'); return; }

  currentUser = user;
  user.last_login = new Date().toISOString().slice(0,10);
  persist('users', {...user});
  localStorage.setItem('wcrm_session', JSON.stringify({id:user.id, name:user.name, role:user.role}));
  startApp();
}

function showLoginErr(msg) {
  const el=$('l-err'); el.textContent=msg; el.style.display='block';
}

function simpleHash(s) {
  let h=0; for(let i=0;i<s.length;i++) h=((h<<5)-h+s.charCodeAt(i))|0;
  return Math.abs(h).toString(36);
}

async function connectApi() {
  const url = $('l-api').value.trim();
  if(!url.includes('script.google.com')) { showLoginErr('Enter a valid Apps Script URL'); return; }
  API = url;
  localStorage.setItem('wcrm_url', url);
  showLoginErr('Connecting...');
  try {
    await loadAll();
    $('l-err').style.display='none';
    if(db.users.length===0) {
      // First time — show setup note
      showLoginErr('Connected! Add a user in Settings first, or set a password below.');
    }
  } catch(e) {
    showLoginErr('Connection failed: '+e.message);
  }
}

function logout() {
  localStorage.removeItem('wcrm_session');
  currentUser = null;
  $('app').style.display='none';
  $('login-screen').style.display='flex';
  toggleUserMenu();
}

function toggleUserMenu() {
  const m=$('user-menu');
  m.style.display = m.style.display==='none'?'block':'none';
  if(m.style.display==='block') {
    $('um-name').textContent = currentUser?.name||'';
    $('um-role').textContent = currentUser?.role==='manager'?'Sales Manager':'Sales Rep';
  }
}

// ═══════════════════════════════════════════════════════════
// APP STARTUP
// ═══════════════════════════════════════════════════════════
async function startApp() {
  $('login-screen').style.display='none';
  $('app').style.display='flex';
  $('user-av').textContent = ini(currentUser.name);
  $('user-name').textContent = currentUser.name.split(' ')[0]+' '+( currentUser.name.split(' ')[1]?currentUser.name.split(' ')[1][0]+'.':'');
  $('user-role').textContent = currentUser.role==='manager'?'Sales Manager':'Sales Rep';
  applyRoleUI();
  go('dashboard');
  setupMobile();
}

function applyRoleUI() {
  if(currentUser?.role!=='manager') {
    // Hide admin items for reps
    document.querySelectorAll('[data-manager-only]').forEach(el=>el.style.display='none');
  }
}

// Navigation
function go(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  else { const btn=document.querySelector(`.nav-item[data-page="${page}"]`); if(btn) btn.classList.add('active'); }
  $('topbar-right').innerHTML='';
  const pages = {
    dashboard: renderDashboard, pipeline: renderPipeline, companies: renderCompanies,
    contacts: renderContacts, leads: renderLeads, clientmap: renderClientMap,
    fleet: renderFleet, reports: renderReports, calendar: renderCalendar,
    contracts: renderContracts, parts: renderParts, settings: renderSettings
  };
  if(pages[page]) pages[page]();
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
}

function updateBadges() {
  const myD = myDeals();
  $('nb-pipeline').textContent = myD.filter(d=>isActive(d.stage)).length;
  $('nb-companies').textContent = db.companies.length;
  $('nb-contacts').textContent = db.contacts.length;
  const newLeads = db.leads.filter(l=>l.status==='New').length;
  $('nb-leads').textContent = newLeads;
  $('nb-leads').style.display = newLeads>0?'flex':'none';
  $('nb-fleet').textContent = db.fleet.filter(f=>f.condition!=='Competitor').length;
  const expContracts = db.contracts.filter(c=>c.status==='Active').length;
  $('nb-contracts').textContent = expContracts;
  $('nb-contracts').style.display = expContracts>0?'flex':'none';
  // Overdue tasks badge on notif
  const overdue = db.tasks.filter(t=>!t.done&&t.due&&t.due<today()).length;
  $('notif-badge').textContent = overdue;
  $('notif-badge').style.display = overdue>0?'flex':'none';
}

function setupMobile() {
  if(window.innerWidth<=768) {
    $('mobile-menu-btn').style.display='flex';
  }
  window.addEventListener('resize',()=>{
    $('mobile-menu-btn').style.display=window.innerWidth<=768?'flex':'none';
    if(window.innerWidth>768) document.getElementById('sidebar').classList.remove('open');
  });
}

// ═══════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════
function onSearch(q) {
  if(!q.trim()) { hideSearchResults(); return; }
  const results = [];
  const lq = q.toLowerCase();
  db.companies.filter(c=>(c.name||'').toLowerCase().includes(lq)||(c.city||'').toLowerCase().includes(lq)).slice(0,4).forEach(c=>results.push({type:'Company',label:c.name,sub:c.industry||'',id:c.id,page:'companies'}));
  db.contacts.filter(c=>(c.first_name+' '+c.last_name).toLowerCase().includes(lq)||(c.phone||'').includes(q)).slice(0,3).forEach(c=>results.push({type:'Contact',label:c.first_name+' '+c.last_name,sub:c.company||'',id:c.id,page:'contacts'}));
  db.deals.filter(d=>(d.company||'').toLowerCase().includes(lq)||(d.model||'').toLowerCase().includes(lq)).slice(0,3).forEach(d=>results.push({type:'Deal',label:d.company,sub:d.model+' · '+fmtUSD(d.amount),id:d.id,page:'pipeline'}));

  const el=$('search-results');
  if(!results.length){el.innerHTML='<div style="padding:12px 14px;color:var(--text-l);font-size:13px">No results</div>';el.style.display='block';return;}
  el.innerHTML = results.map(r=>`<div class="sr-item" onclick="searchClick('${r.page}','${r.id}')">
    <span class="sr-type">${r.type}</span>
    <div><div style="font-size:13px;font-weight:500">${r.label}</div><div style="font-size:11px;color:var(--text-m)">${r.sub}</div></div>
  </div>`).join('');
  el.style.display='block';
}

function showSearchResults() { if($('search-input').value.trim()) $('search-results').style.display='block'; }
function hideSearchResults() { $('search-results').style.display='none'; }

function searchClick(page, id) {
  hideSearchResults();
  $('search-input').value='';
  if(page==='companies') { go('companies'); openCompany(id); }
  else if(page==='pipeline') { go('pipeline'); openDeal(id); }
  else { go(page); }
}

// NOTIFICATIONS

function toggleNotifPanel() {
  const p=$('notif-panel');

function renderNotifications() {
  const t=today();
  const overdue = db.tasks.filter(task=>!task.done&&task.due&&task.due<t&&(currentUser?.role==='manager'||task.agent===currentUser?.name));
  const dueToday = db.tasks.filter(task=>!task.done&&task.due===t&&(currentUser?.role==='manager'||task.agent===currentUser?.name));
  let html='';
  if(!overdue.length&&!dueToday.length) html='<div class="empty" style="padding:20px">All clear ✓</div>';

    </div>`;

    </div>`;
  });
  $('notif-list').innerHTML=html;
}

function taskRow(task, t) {
  const co = db.companies.find(c=>c.id===task.company_id);
  const cat = co?.category||'';
  const catColor = CO_CATS[cat]?.color||'var(--text-l)';
  const typeIcon = ACT_ICON[task.type]||'ti-checkbox';
  const isOverdue = task.due && task.due < t;
  const isToday = task.due === t;
  return `<div class="today-task" onclick="openTaskModal('${task.id}')">
    <div class="task-check ${task.done?'checked':''}" onclick="event.stopPropagation();quickDoneTask('${task.id}',this)">
      ${task.done?'<i class="ti ti-check" style="font-size:10px"></i>':''}
    </div>
    <div style="width:28px;height:28px;border-radius:50%;background:${catColor}15;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <i class="ti ${typeIcon}" style="font-size:13px;color:${catColor}"></i>
    </div>
    <div style="flex:1;min-width:0">
      <div class="task-title">${task.title||'Task'}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
        <span style="font-size:12px;color:var(--blue);cursor:pointer" onclick="event.stopPropagation();go('companies');openCompany('${task.company_id}')">${task.company||''}</span>
        ${cat?`<span style="font-size:10px;font-weight:700;color:${catColor};background:${catColor}15;padding:1px 5px;border-radius:10px">Cat. ${cat}</span>`:''}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="task-due ${isOverdue?'overdue':isToday?'today':''}">${task.due?fmtDateShort(task.due):'No date'}</div>
      <button class="btn btn-xs btn-primary" style="font-size:10px;padding:2px 6px" onclick="event.stopPropagation();openTaskModal('${task.id}')">

      </button>
    </div>
  </div>`;

async function quickDoneTask(id, el) {
  const task = db.tasks.find(t=>t.id===id);
  if(!task) return;
  task.done = !task.done;
  el.className='task-check'+(task.done?' checked':'');
  el.innerHTML = task.done?'<i class="ti ti-check" style="font-size:10px"></i>':'';
  await persist('tasks', {...task});
  updateBadges();
  if(task.done) openTaskModal(id); // Open to log outcome
}

function dealCard(d, t) {
  const daysSince = d.created ? Math.floor((new Date()-new Date(d.created))/86400000) : 0;
  const stale = daysSince > 30;
  const competitor = d.competitor ? `<span class="badge badge-red" style="font-size:10px">${d.competitor}</span>` : '';
  return `<div class="k-card" draggable="true" ondragstart="onDragDeal('${d.id}',event)" ondragend="event.target.classList.remove('dragging')" onclick="openDeal('${d.id}')" style="border-left-color:${STAGE_COLOR[d.stage]}">
    <div class="k-card-co">${d.company}</div>
    <div class="k-card-model">${d.model||'—'} ${competitor}</div>
    <div class="k-card-amount">${fmtUSD(d.amount)}</div>
    <div class="k-card-foot">
      <span>${d.agent||'—'}</span>
      <span class="${stale?'k-card-stale':''}">${stale?'⚠ '+daysSince+'d':''+daysSince+'d'}</span>
    </div>
    ${d.next_date?`<div style="font-size:11px;color:var(--text-m);margin-top:4px"><i class="ti ti-calendar" style="font-size:10px"></i> ${fmtDateShort(d.next_date)} · ${d.next_action||''}</div>`:''}
    <div class="mobile-stage-btns" style="display:none;gap:4px;margin-top:8px;flex-wrap:wrap">
      ${ACTIVE_STAGES.filter(s=>s!==d.stage).slice(0,2).map(s=>`<button class="btn btn-xs" style="color:${STAGE_COLOR[s]}" onclick="event.stopPropagation();moveDealToStage(db.deals.find(x=>x.id==='${d.id}'),'${s}')">${s}</button>`).join('')}
      ${isActive(d.stage)?`<button class="btn btn-xs btn-success" onclick="event.stopPropagation();moveDealToStage(db.deals.find(x=>x.id==='${d.id}'),'Won')">Won</button>`:''}
    </div>
  </div>`;
}

let _dragDealId = null;
function onDragDeal(id, e) {
  _dragDealId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}

async function onDropToStage(stage, e) {
  e.preventDefault();
  document.querySelectorAll('.k-cards').forEach(el=>el.classList.remove('drag-over'));
  if(!_dragDealId) return;
  const deal = db.deals.find(d=>d.id===_dragDealId);
  if(!deal||deal.stage===stage) return;
  await moveDealToStage(deal, stage);
  _dragDealId = null;
}

async function moveDealToStage(deal, stage) {
  const prev = deal.stage;
  if(stage==='Won') {
    if(!confirm(`Move "${deal.company} — ${deal.model}" to WON?\n\n• Equipment will be added to client fleet\n• Company status → Active`)) return;
  }
  if(stage==='Lost') {
    const reason = await pickLostReason(deal);
    if(reason===null) return;
    deal.lost_reason = reason.reason;
    deal.competitor = reason.competitor;
    deal.competitor_price = reason.price;
  }
  if(stage==='Disqualified') {
    const reason = await pickDisqReason();
    if(reason===null) return;
    deal.disq_reason = reason.reason;
    deal.disq_comment = reason.comment;
  }
  deal.stage = stage;
  deal.probability = {Lead:10,Qualified:25,Proposal:50,Negotiation:75,Won:100,Lost:0,Disqualified:0}[stage]||0;
  await persist('deals', deal);
  // Side effects
  if(stage==='Won' && prev!=='Won') await onDealWon(deal);
  if(stage==='Lost' && prev!=='Lost') await onDealLost(deal);
  renderPipeline();
  updateBadges();
}

function pickLostReason(deal) {
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.className='overlay';
    ov.innerHTML=`<div class="modal" style="width:420px">
      <div class="modal-header"><div class="modal-title">Mark as Lost</div><button class="modal-close" onclick="this.closest('.overlay').remove();resolve(null)"><i class="ti ti-x"></i></button></div>
      <div class="modal-body">
        <div class="fg"><label class="fl">Reason *</label>
          <select class="fc" id="pl-reason">${LOST_REASONS.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Competitor</label><input class="fc" id="pl-comp" value="${deal.competitor||''}" placeholder="CAT, Komatsu..."></div>
        <div class="fg" id="pl-price-wrap" style="display:none"><label class="fl">Competitor Price ($)</label><input class="fc" id="pl-price" type="number" value="${deal.competitor_price||''}"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="this.closest('.overlay').remove()">Cancel</button>
        <button class="btn btn-danger" onclick="
          const r={reason:document.getElementById('pl-reason').value,competitor:document.getElementById('pl-comp').value,price:Number(document.getElementById('pl-price').value)||0};
          this.closest('.overlay').remove();
        ">Mark Lost</button>
      </div>
    </div>`;
    document.getElementById('pl-reason')?.addEventListener('change',function(){
      document.getElementById('pl-price-wrap').style.display=this.value==='Price too high'?'block':'none';
    });
    document.body.appendChild(ov);
    // Resolve via button click
    ov.querySelector('.btn-danger').onclick=function(){
      const r={reason:ov.querySelector('#pl-reason').value,competitor:ov.querySelector('#pl-comp').value,price:Number(ov.querySelector('#pl-price').value)||0};
      ov.remove(); resolve(r);
    };
    ov.querySelector('.btn').onclick=function(){ov.remove();resolve(null);};
    ov.querySelector('.modal-close').onclick=function(){ov.remove();resolve(null);};
  });
}

function pickDisqReason() {
  return new Promise(resolve=>{
    const ov=document.createElement('div');
    ov.className='overlay';
    ov.innerHTML=`<div class="modal" style="width:420px">
      <div class="modal-header"><div class="modal-title">Disqualify Lead</div><button class="modal-close"><i class="ti ti-x"></i></button></div>
      <div class="modal-body">
        <div class="fg"><label class="fl">Reason *</label><select class="fc" id="pd-reason"><option value="">— select —</option>${DISQ_REASONS.map(r=>`<option>${r}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Comment</label><input class="fc" id="pd-comment" placeholder="What did you find out?"></div>
      </div>
      <div class="modal-footer">
        <button class="btn">Cancel</button>
        <button class="btn btn-danger">Disqualify</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('.btn-danger').onclick=function(){
      const r=ov.querySelector('#pd-reason').value;
      if(!r){alert('Select a reason');return;}
      resolve({reason:r,comment:ov.querySelector('#pd-comment').value});
      ov.remove();
    };
    ov.querySelectorAll('.btn:not(.btn-danger)').forEach(b=>b.onclick=function(){ov.remove();resolve(null);});
    ov.querySelector('.modal-close').onclick=function(){ov.remove();resolve(null);};
  });
}

async function onDealWon(deal) {
  // Add to fleet
  if(deal.model) {
    const brand = WAYLAND_BRANDS.find(b=>deal.model.toLowerCase().includes(b.toLowerCase()))||'Hitachi';
    const unit = {id:uid(),company_id:deal.company_id,company:deal.company,brand,model:deal.model,type:'',year:new Date().getFullYear(),serial:'',condition:'New',notes:'From Won deal',deal_id:deal.id};
    db.fleet.push(unit); await persist('fleet',unit);
    toast('🚜 '+deal.model+' added to fleet');
  }
  // Company → Active
  const co = db.companies.find(c=>c.id===deal.company_id);
  if(co&&co.status==='Prospect'){co.status='Active';await persist('companies',{...co});}
}

async function onDealLost(deal) {
  if(deal.competitor) {
    const unit={id:uid(),company_id:deal.company_id,company:deal.company,brand:deal.competitor,model:deal.model||'Unknown',type:'',year:new Date().getFullYear(),serial:'',condition:'Competitor',notes:'Lost deal',deal_id:deal.id};
    db.fleet.push(unit); await persist('fleet',unit);
  }
  // Follow-up dialog
  showFollowupDialog(deal);
}

function showFollowupDialog(deal) {
  const ov=document.createElement('div');
  ov.className='overlay';
  ov.innerHTML=`<div class="modal" style="width:380px">
    <div class="modal-header"><div class="modal-title">Schedule follow-up?</div></div>
    <div class="modal-body">
      <div style="font-size:13px;color:var(--text-m);margin-bottom:16px">${deal.company} · ${deal.model||''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[['1 month',30],['3 months',90],['6 months',180],['1 year',365]].map(([l,d])=>
          `<button class="btn" style="justify-content:center" onclick="createFollowup('${deal.id}','${deal.company_id}','${deal.company}','${deal.agent||''}',${d});this.closest('.overlay').remove()">${l}</button>`
        ).join('')}
      </div>
    </div>
    <div class="modal-footer"><button class="btn" onclick="this.closest('.overlay').remove()">Skip</button></div>
  </div>`;
  document.body.appendChild(ov);
}

async function createFollowup(dealId,coId,coName,agent,days) {
  const due=new Date(); due.setDate(due.getDate()+days);
  const task={id:uid(),deal_id:dealId,company_id:coId,company:coName,title:'Follow-up: '+coName,agent:agent||currentUser?.name||'',due:due.toISOString().slice(0,10),priority:'medium',type:'Call',done:false,auto_scheduled:false,created:today()};
  db.tasks.push(task); await persist('tasks',task); updateBadges();
  toast('📅 Follow-up scheduled for '+fmtDate(task.due));
}

function sortCo(col) {
  if(_coSort.col===col) _coSort.dir*=-1; else {_coSort.col=col;_coSort.dir=1;}
  renderCoRows();
}

function renderCoRows() {
  const q = (_coFilter||'').toLowerCase();
  const statusF = $('co-status-filter')?.value||'';
  const catF = ($('co-cat-filter')?.value||'').replace('Cat. ','');
  let list = db.companies.filter(c=>{
    if(statusF && c.status!==statusF) return false;
    if(catF && c.category!==catF) return false;
    if(q && !(c.name||'').toLowerCase().includes(q) && !(c.city||'').toLowerCase().includes(q) && !(c.industry||'').toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>{const va=a[_coSort.col]||'',vb=b[_coSort.col]||'';return va.localeCompare(vb)*_coSort.dir;});

  const t = today();
  $('co-rows').innerHTML = list.map(co=>{
    const contacts = db.contacts.filter(c=>c.company_id===co.id).length;
    const deals = db.deals.filter(d=>d.company_id===co.id&&isActive(d.stage)).length;
    const fleet = db.fleet.filter(f=>f.company_id===co.id&&f.condition!=='Competitor').length;
    const lastAct = db.activities.filter(a=>a.company_id===co.id&&a.type!=='stage'&&!((a.note||a.text||'').startsWith('Updated:'))).sort((a,b)=>(b.created||b.date||'').localeCompare(a.created||a.date||'')).shift();
    const cat = co.category;
    const catColor = cat&&CO_CATS[cat]?CO_CATS[cat].color:'var(--text-l)';
    const statusBadge = {Active:'badge-green',Prospect:'badge-blue',Negotiating:'badge-amber',Partner:'badge-purple',Inactive:'badge-gray',Cold:'badge-gray'}[co.status]||'badge-gray';
    return `<tr onclick="openCompany('${co.id}')">
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="av ${avColor(co.name)}" style="width:28px;height:28px;font-size:11px">${ini(co.name)}</div>
        <div><div style="font-weight:600">${co.name}</div><div style="font-size:11px;color:var(--text-m)">${co.assigned_agent||''}</div></div>
      </div></td>
      <td style="color:var(--text-m);font-size:12px">${co.industry||'—'}</td>
      <td>${cat?`<span class="badge" style="background:${CO_CATS[cat]?.bg};color:${catColor}">${cat}</span>`:'—'}</td>
      <td style="color:var(--text-m)">${co.city||'—'}</td>
      <td style="text-align:center">${contacts||'—'}</td>
      <td style="text-align:center">${deals?`<span style="color:var(--blue);font-weight:600">${deals}</span>`:'—'}</td>
      <td style="text-align:center">${fleet?`<span style="color:var(--green)">${fleet}</span>`:'—'}</td>
      <td style="font-size:12px">${lastAct?`<span style="color:${lastAct.created&&lastAct.created.slice(0,10)<t?'var(--text-m)':'var(--text)'}">${timeAgo(lastAct.created||lastAct.date)}</span>`:'—'}</td>

function filterCoActs(types, coId, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const acts = db.activities.filter(a=>a.company_id===coId).sort((a,b)=>(b.created||b.date||'').localeCompare(a.created||a.date||''));
  const filtered = types==='all' ? acts : types==='notes' ? acts.filter(a=>a.type==='Note') : acts.filter(a=>types.split(',').includes(a.type));
  $('co-act-feed').innerHTML = renderActFeed(filtered, coId);
}

function renderActFeed(acts, coId) {
  if(!acts.length) return `<div class="empty" style="padding:32px">
    <i class="ti ti-clock"></i><div class="empty-title">No activity yet</div>
    <div class="empty-sub">Log calls, meetings and conversations</div>
    <button class="btn btn-primary" onclick="openLogActivity('${coId}')"><i class="ti ti-phone"></i> Log First Activity</button>
  </div>`;

  return '<div class="act-feed">' + acts.map(a=>`<div class="act-item">
    <div class="act-icon ${ACT_CLASS[a.type]||'other'}"><i class="ti ${ACT_ICON[a.type]||'ti-dots'}"></i></div>
    <div style="flex:1;min-width:0">
      <div class="act-meta">${a.type} · ${a.contact_name||''} ${a.direction?'('+a.direction+')':''} · ${timeAgo(a.created||a.date)} · ${a.agent||''}</div>
      ${a.text||a.note?`<div class="act-text">${a.note||a.text}</div>`:''}
      ${a.outcome?`<div class="act-outcome"><strong>Outcome:</strong> ${a.outcome}</div>`:''}
      ${a.next_step?`<div style="font-size:12px;color:var(--blue);margin-top:4px"><i class="ti ti-arrow-right" style="font-size:11px"></i> Next: ${a.next_step} ${a.next_date?'· '+fmtDateShort(a.next_date):''}</div>`:''}
    </div>
    <button class="btn btn-xs btn-ghost" style="flex-shrink:0" onclick="deleteAct('${a.id}','${coId}')"><i class="ti ti-x"></i></button>
  </div>`).join('') + `<div style="text-align:center;padding:16px 0">
    <button class="btn btn-primary" style="padding:10px 28px" onclick="openLogActivity('${coId}')"><i class="ti ti-phone"></i> Log Activity</button>
  </div></div>`;
}

async function deleteAct(id, coId) {
  if(!confirm('Delete this activity?')) return;
  await remove('activities', id);
  db.activities = db.activities.filter(a=>a.id!==id);
  openCompany(coId);
}

function initMiniMap(containerId, locations) {
  const el=document.getElementById(containerId);
  if(!el) return;
  const locs = locations.filter(l=>l.lat&&l.lng);
  if(!locs.length) return;
  const map = L.map(containerId,{attributionControl:false,zoomControl:false}).setView([parseFloat(locs[0].lat),parseFloat(locs[0].lng)],13);
  L.tileLayer('https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key='+MAPTILER_KEY,{maxZoom:20}).addTo(map);
  locs.forEach(l=>{
    L.marker([parseFloat(l.lat),parseFloat(l.lng)]).addTo(map).bindPopup(l.name||l.type||'Location');
  });
  if(locs.length>1) map.fitBounds(locs.map(l=>[parseFloat(l.lat),parseFloat(l.lng)]),{padding:[10,10]});
}

async function aiParseNote() {
  const note = $('la-note')?.value.trim();
  if(!note || note.length < 20) { toast('Write at least a few sentences first'); return; }
  const btn = $('ai-parse-btn');
  const result = $('ai-parse-result');
  btn.innerHTML='<i class="ti ti-loader-2 spin"></i>';
  btn.disabled=true;
  try {
    const prompt='Extract from this sales call note:\n1. Sentiment (Positive/Neutral/Negative)\n2. Next step (what was agreed)\n3. Next date (if mentioned)\n4. Budget (if mentioned)\n5. Key facts (2-3 bullet points)\n\nNote: "'+note+'"\n\nReply ONLY in JSON: {"sentiment":"","next_step":"","next_date":"","budget":"","facts":[]}';
    const data = await apiCall({action:'claude', prompt});
    const text = data?.text || '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if(result) {
      result.style.display='block';
      result.innerHTML = '<div style="font-weight:600;color:var(--purple);margin-bottom:6px"><i class="ti ti-sparkles"></i> AI extracted:</div>'+
        (parsed.sentiment?'<div>😊 Sentiment: <strong>'+parsed.sentiment+'</strong></div>':'')+
        (parsed.next_step?'<div>→ Next: <strong>'+parsed.next_step+'</strong></div>':'')+
        (parsed.next_date?'<div>📅 Date: <strong>'+parsed.next_date+'</strong></div>':'')+
        (parsed.budget?'<div>💰 Budget: <strong>'+parsed.budget+'</strong></div>':'')+
        (parsed.facts?.length?'<ul style="margin:4px 0 0 14px">'+parsed.facts.map(f=>'<li>'+f+'</li>').join('')+'</ul>':'');
      // Auto-fill fields
      if(parsed.next_step && $('la-next')) $('la-next').value = parsed.next_step;
      if(parsed.sentiment && $('la-sentiment')) $('la-sentiment').value = parsed.sentiment;
    }
  } catch(e) {
    toast('AI parse failed. Check API key in Settings.');
  }
  btn.innerHTML='<i class="ti ti-sparkles" style="color:#7c3aed"></i> AI Parse';
  btn.disabled=false;
}

    </div>

    <div style="background:var(--bg);border-radius:var(--radius);padding:12px;border:1px solid var(--bdr)">
      <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--text-m)">📅 Next contact</div>

    // Log activity if outcome provided
    if(outcome) {

    if(nextType && nextDate) {
      const nt={id:uid(),company_id:task.company_id,company:task.company||'',title:nextType+': '+task.company,type:nextType,agent:task.agent||currentUser?.name||'',due:nextDate,priority:task.priority||'medium',done:false,auto_scheduled:false,created:today()};

// MODAL ENGINE
// ═══════════════════════════════════════════════════════════
let _modalSaveCallback = null;

function showModal(title, body, onSave, saveLabel, noFooter, extraBtns) {
  $('modal-title').textContent = title;
  $('modal-body').innerHTML = body;
  _modalSaveCallback = onSave;
  const footer = $('modal-footer');
  if(noFooter===true || onSave===null) {
    footer.style.display='none';
  } else {
    footer.style.display='flex';
    footer.innerHTML='<button class="btn" onclick="closeModal()">Cancel</button>';
    if(extraBtns) extraBtns.forEach(b=>{
      const btn=document.createElement('button');
      btn.className='btn'+(b.danger?' btn-danger':'');
      btn.textContent=b.label;
      btn.onclick=b.action;
      footer.appendChild(btn);
    });
    if(onSave) {
      const saveBtn=document.createElement('button');
      saveBtn.className='btn btn-primary';
      saveBtn.id='modal-save';
      saveBtn.innerHTML='<i class="ti ti-check"></i> '+(saveLabel||'Save');
      saveBtn.onclick=saveModal;
      footer.appendChild(saveBtn);
    }
  }
  $('modal-overlay').style.display='flex';
  // Focus first input
  setTimeout(()=>$('modal-body').querySelector('input,textarea,select')?.focus(), 50);
}

async function saveModal() {
  if(!_modalSaveCallback) return;
  const btn=$('modal-save');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> Saving...';}
  try {
    const result = await _modalSaveCallback();
    if(result!==false) closeModal();
  } catch(e) {
    toast('Error: '+e.message);
  } finally {
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> Save';}
  }
}

function closeModal() {
  $('modal-overlay').style.display='none';
  _modalSaveCallback=null;
}

function renderReports() {
  const tr=$('topbar-right');
  const isManager=currentUser?.role==='manager';
  if(isManager) tr.innerHTML=`<select class="btn" id="rp-filter" onchange="renderReports()"><option value="">👥 All managers</option>${AGENTS().map(a=>`<option>${a}</option>`).join('')}</select>`;

  const repFilter=$('rp-filter')?.value||'';
  const baseDeals=isManager?db.deals:myDeals();
  const filtered=repFilter?baseDeals.filter(d=>d.agent===repFilter):baseDeals;

  const won=filtered.filter(d=>d.stage==='Won');
  const lost=filtered.filter(d=>d.stage==='Lost');
  const disq=filtered.filter(d=>d.stage==='Disqualified');
  const active=filtered.filter(d=>isActive(d.stage));
  const wonVal=won.reduce((s,d)=>s+d.amount,0);
  const lostVal=lost.reduce((s,d)=>s+d.amount,0);
  const pipeVal=active.reduce((s,d)=>s+d.amount,0);
  const wr=won.length+lost.length>0?Math.round(won.length/(won.length+lost.length)*100):0;

  const compMap={};lost.forEach(d=>{if(d.competitor){if(!compMap[d.competitor])compMap[d.competitor]={count:0,val:0};compMap[d.competitor].count++;compMap[d.competitor].val+=d.amount;}});
  const compList=Object.entries(compMap).sort((a,b)=>b[1].val-a[1].val);
  const reasonMap={};lost.forEach(d=>{const r=d.lost_reason||'Unknown';reasonMap[r]=(reasonMap[r]||0)+1;});
  const reasonList=Object.entries(reasonMap).sort((a,b)=>b[1]-a[1]);

  const agents=AGENTS();
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const cutStr=cutoff.toISOString().slice(0,10);
  const recentActs=db.activities.filter(a=>(a.date||a.created||'')>=cutStr&&a.type!=='stage');

  const stageCnts=['Lead','Qualified','Proposal','Negotiation','Won'].map(s=>filtered.filter(d=>d.stage===s).length);
  const maxStage=Math.max(...stageCnts,1);

  const fmap={};
  active.forEach(d=>{if(!d.next_date)return;const m=d.next_date.slice(0,7);if(!fmap[m])fmap[m]={val:0,count:0};fmap[m].val+=d.amount*(d.probability||50)/100;fmap[m].count++;});
  const fmonths=Object.entries(fmap).sort((a,b)=>a[0].localeCompare(b[0])).slice(0,6);
  const maxForecast=Math.max(...fmonths.map(x=>x[1].val),1);

  $('content').innerHTML=`
  <!-- Metrics -->
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px">
    ${[
      {l:'Active Pipeline',v:fmtUSD(pipeVal),s:active.length+' deals',c:'',tc:'var(--blue)'},
      {l:'Won Revenue',v:fmtUSD(wonVal),s:won.length+' deals',c:'green',tc:'var(--green)'},
      {l:'Lost Revenue',v:fmtUSD(lostVal),s:lost.length+' lost',c:'red',tc:'var(--red)'},
      {l:'Win Rate',v:wr+'%',s:won.length+' won · '+lost.length+' lost',c:wr>=30?'green':wr>=15?'amber':'red',tc:wr>=30?'var(--green)':wr>=15?'var(--amber)':'var(--red)'},
      {l:'Avg Deal',v:fmtUSD(filtered.length?Math.round(filtered.reduce((s,d)=>s+d.amount,0)/filtered.length):0),s:filtered.length+' total',c:'',tc:'var(--text)'},
      {l:'Disqualified',v:disq.length,s:'not target clients',c:'',tc:'var(--gray)'},
    ].map(m=>`<div class="metric-card ${m.c}"><div class="metric-label">${m.l}</div><div class="metric-value" style="color:${m.tc};font-size:20px">${m.v}</div><div class="metric-sub">${m.s}</div></div>`).join('')}
  </div>

  <!-- Manager Performance -->
  <div class="card" style="margin-bottom:16px">
    <div class="card-header"><div class="card-title">📊 Manager Performance</div></div>
    <table class="tbl"><thead><tr><th>Manager</th><th style="text-align:center">Total</th><th style="text-align:center">Active</th><th style="text-align:center">Won</th><th style="text-align:center">Lost</th><th style="text-align:center">Disq</th><th style="text-align:center">Win Rate</th><th style="text-align:right">Won $</th><th style="text-align:right">Pipeline</th></tr></thead>
    <tbody>${agents.map(name=>{
      const ad=baseDeals.filter(d=>d.agent===name);
      const aw=ad.filter(d=>d.stage==='Won'),al=ad.filter(d=>d.stage==='Lost'),adq=ad.filter(d=>d.stage==='Disqualified'),aact=ad.filter(d=>isActive(d.stage));
      const awr=aw.length+al.length>0?Math.round(aw.length/(aw.length+al.length)*100):0;
      const u=db.users.find(x=>x.name===name);
      return`<tr><td><div style="display:flex;align-items:center;gap:8px"><div class="av ${avColor(name)}" style="width:28px;height:28px;font-size:11px">${ini(name)}</div><div><div style="font-weight:600">${name}</div><div style="font-size:11px;color:var(--text-m)">${u?.role==='manager'?'Sales Manager':'Sales Rep'}</div></div></div></td>
        <td style="text-align:center">${ad.length}</td>
        <td style="text-align:center;color:var(--blue);font-weight:600">${aact.length}</td>
        <td style="text-align:center;color:var(--green);font-weight:600">${aw.length}</td>
        <td style="text-align:center;color:var(--red);font-weight:600">${al.length}</td>
        <td style="text-align:center;color:var(--gray)">${adq.length}</td>
        <td style="text-align:center;font-weight:700;color:${awr>=30?'var(--green)':awr>=15?'var(--amber)':'var(--red)'}">${awr}%</td>
        <td style="text-align:right;font-weight:600;color:var(--green)">${fmtUSD(aw.reduce((s,d)=>s+d.amount,0))}</td>
        <td style="text-align:right;color:var(--blue)">${fmtUSD(aact.reduce((s,d)=>s+d.amount,0))}</td>
      </tr>`;
    }).join('')}</tbody></table>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <!-- Funnel -->
    <div class="card"><div class="card-header"><div class="card-title">🔽 Conversion Funnel</div></div><div class="card-body">
      ${['Lead','Qualified','Proposal','Negotiation','Won'].map((s,i)=>{
        const cnt=stageCnts[i];const pct=Math.round(cnt/maxStage*100);
        const conv=i>0&&stageCnts[i-1]?Math.round(cnt/stageCnts[i-1]*100):100;
        const val=filtered.filter(d=>d.stage===s).reduce((a,d)=>a+d.amount,0);
        return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:600;color:${STAGE_COLOR[s]}">${s}</span><span style="color:var(--text-m)">${cnt} deals${i>0?' · '+conv+'%':''}</span></div>
          <div style="height:24px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${STAGE_COLOR[s]};border-radius:4px;display:flex;align-items:center;padding-left:8px">${pct>20?`<span style="font-size:11px;color:#fff;font-weight:600">${fmtUSD(val)}</span>`:''}</div></div></div>`;
      }).join('')}
    </div></div>

    <!-- Competitor -->
    <div class="card"><div class="card-header"><div class="card-title">⚔️ Competitor Analysis</div></div><div class="card-body">
      ${compList.length?`<table class="tbl"><thead><tr><th>Competitor</th><th style="text-align:center">Wins</th><th style="text-align:right">Lost $</th></tr></thead><tbody>
        ${compList.map(([b,d])=>`<tr><td style="font-weight:600;color:var(--red)">${b}</td><td style="text-align:center">${d.count}</td><td style="text-align:right;color:var(--red)">${fmtUSD(d.val)}</td></tr>`).join('')}
      </tbody></table>
      <div style="margin-top:12px;border-top:1px solid var(--bdr);padding-top:10px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);margin-bottom:6px">Loss reasons</div>
        ${reasonList.slice(0,5).map(([r,n])=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>${r}</span><span class="badge badge-red">${n}</span></div>`).join('')}
      </div>`:'<div class="empty" style="padding:20px"><div class="empty-sub">No lost deals yet</div></div>'}
    </div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <!-- Activity -->
    <div class="card"><div class="card-header"><div class="card-title">📞 Team Activity — Last 30 Days</div></div>
      <table class="tbl"><thead><tr><th>Manager</th><th style="text-align:center">Calls</th><th style="text-align:center">Meetings</th><th style="text-align:center">Proposals</th><th style="text-align:center">Total</th></tr></thead><tbody>
        ${agents.map(name=>{const acts=recentActs.filter(a=>a.agent===name);return`<tr><td style="font-weight:600">${name}</td><td style="text-align:center">${acts.filter(a=>a.type==='Call').length||'—'}</td><td style="text-align:center">${acts.filter(a=>a.type==='Meeting').length||'—'}</td><td style="text-align:center">${acts.filter(a=>a.type==='Proposal').length||'—'}</td><td style="text-align:center;font-weight:700">${acts.length||'—'}</td></tr>`;}).join('')}
      </tbody></table>
    </div>

    <!-- Forecast -->
    <div class="card"><div class="card-header"><div class="card-title">📅 Revenue Forecast (weighted)</div></div><div class="card-body">
      ${fmonths.length?fmonths.map(([m,data])=>{
        const label=new Date(m+'-01').toLocaleString('en',{month:'long',year:'numeric'});
        const pct=Math.round(data.val/maxForecast*100);
        return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:600">${label}</span><span style="color:var(--blue);font-weight:600">${fmtUSD(Math.round(data.val))}</span></div><div style="height:20px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--blue);border-radius:4px"></div></div><div style="font-size:11px;color:var(--text-m)">${data.count} deals</div></div>`;
      }).join(''):'<div class="empty" style="padding:20px"><div class="empty-sub">Set next action dates on deals to see forecast</div></div>'}
    </div></div>
  </div>`;
}

function renderCalendar() {
  const tr=$('topbar-right');
  tr.innerHTML=`
    <select class="btn" id="cal-agent" onchange="renderCalendar()"><option value="">All Managers</option>${AGENTS().map(a=>`<option>${a}</option>`).join('')}</select>
    <div style="display:flex;gap:4px">
      <button class="btn${_calView==='month'?' btn-primary':''}" onclick="_calView='month';_calOffset=0;renderCalendar()">Month</button>
      <button class="btn${_calView==='quarter'?' btn-primary':''}" onclick="_calView='quarter';_calOffset=0;renderCalendar()">Quarter</button>
    </div>
    <button class="btn" onclick="_calOffset--;renderCalendar()"><i class="ti ti-chevron-left"></i></button>
    <button class="btn" onclick="_calOffset=0;renderCalendar()">Today</button>
    <button class="btn" onclick="_calOffset++;renderCalendar()"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" onclick="rebuildSchedule()"><i class="ti ti-refresh"></i> Rebuild</button>
    <button class="btn" style="color:var(--red)" onclick="clearAutoTasks()"><i class="ti ti-trash"></i> Clear auto</button>`;

  const agentF=$('cal-agent')?.value||'';
  const allTasks=db.tasks.filter(t=>{
    if(t.done||!t.due)return false;
    if(agentF&&t.agent!==agentF)return false;
    const co=db.companies.find(c=>c.id===t.company_id);
    const cat=co?.category||'';
    return !cat||_calCatFilter.has(cat);
  });

  const now=new Date();
  const nMonths=_calView==='quarter'?3:1;
  const startM=new Date(now.getFullYear(),now.getMonth()+_calOffset,1);
  const endM=new Date(startM.getFullYear(),startM.getMonth()+nMonths-1,1);
  const label=_calView==='quarter'?startM.toLocaleString('en',{month:'long',year:'numeric'})+' — '+endM.toLocaleString('en',{month:'long',year:'numeric'}):startM.toLocaleString('en',{month:'long',year:'numeric'});

  const firstDay=new Date(startM);
  const lastDay=new Date(startM.getFullYear(),startM.getMonth()+nMonths,0);
  const gridStart=new Date(firstDay);
  const sd=gridStart.getDay();gridStart.setDate(gridStart.getDate()-(sd===0?6:sd-1));
  const gridEnd=new Date(lastDay);
  const ed=gridEnd.getDay();if(ed!==0)gridEnd.setDate(gridEnd.getDate()+(7-ed));

  const gridDays=[];for(const d=new Date(gridStart);d<=gridEnd;d.setDate(d.getDate()+1))gridDays.push(new Date(d));

  const tasksByDay={};
  allTasks.forEach(t=>{
    if(!tasksByDay[t.due])tasksByDay[t.due]={};
    const key=t.company_id||t.company;
    if(!tasksByDay[t.due][key])tasksByDay[t.due][key]={task:t,count:0};
    tasksByDay[t.due][key].count++;
  });

  const todayStr=[now.getFullYear(),String(now.getMonth()+1).padStart(2,'0'),String(now.getDate()).padStart(2,'0')].join('-');
  const catColor={A:'#ef4444',B:'#f59e0b',C:'#3b82f6',D:'#9ca3af'};

  const legend=['A','B','C','D'].map(cat=>{
    const active=_calCatFilter.has(cat);
    return`<span onclick="toggleCalCat('${cat}');renderCalendar()" style="display:inline-flex;align-items:center;gap:5px;cursor:pointer;padding:3px 10px;border-radius:20px;border:1.5px solid ${active?catColor[cat]:'var(--bdr)'};background:${active?catColor[cat]+'20':'transparent'};opacity:${active?1:0.5};font-size:12px;margin-right:6px"><span style="width:8px;height:8px;border-radius:50%;background:${catColor[cat]}"></span>${cat} — ${CO_CATS[cat].desc}</span>`;
  }).join('');

  const dayH=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d,i)=>`<div style="padding:6px;text-align:center;font-size:11px;font-weight:700;color:${i>=5?'#94a3b8':'var(--text-m)'};text-transform:uppercase;letter-spacing:.5px">${d}</div>`).join('');

  const cells=gridDays.map(day=>{
    const dStr=[day.getFullYear(),String(day.getMonth()+1).padStart(2,'0'),String(day.getDate()).padStart(2,'0')].join('-');
    const inPeriod=day>=firstDay&&day<=lastDay;
    const isToday=dStr===todayStr;
    const isWeekend=day.getDay()===0||day.getDay()===6;
    const grouped=tasksByDay[dStr]?Object.values(tasksByDay[dStr]).sort((a,b)=>a.task.company.localeCompare(b.task.company)):[];
    const max=3;const extra=grouped.length>max?grouped.length-max:0;
    return`<div style="min-height:88px;padding:4px;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);background:${isToday?'var(--blue-lt)':isWeekend?'var(--sur2)':'#fff'};opacity:${inPeriod?1:0.4}">
      <div style="margin-bottom:2px"><span style="font-size:12px;font-weight:${isToday?700:400};color:${isToday?'#fff':'var(--text)'};background:${isToday?'var(--blue)':'transparent'};width:${isToday?'22px':'auto'};height:${isToday?'22px':'auto'};border-radius:50%;display:inline-flex;align-items:center;justify-content:center">${day.getDate()}</span></div>
      ${grouped.slice(0,max).map(item=>{
        const co=db.companies.find(c=>c.id===item.task.company_id);
        const cat=co?.category||'';
        const color=catColor[cat]||'var(--text-l)';
        return`<div data-coid="${co?.id||''}" onclick="if(this.dataset.coid){go('companies');openCompany(this.dataset.coid)}" style="font-size:10px;padding:2px 4px;margin-bottom:2px;border-radius:3px;border-left:2px solid ${color};background:${color}12;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${item.task.company}">
          ${cat?`<strong style="color:${color}">${cat}</strong> `:''}${item.task.company}${item.count>1?` +${item.count-1}`:''}
        </div>`;
      }).join('')}
      ${extra?`<div style="font-size:10px;color:var(--text-m);padding:1px 3px">+${extra} more</div>`:''}
    </div>`;
  }).join('');

  $('content').innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <div style="font-size:18px;font-weight:700">${label}</div>
    <div>${legend}</div>
  </div>
  <div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--radius-lg);overflow:hidden">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);border-bottom:2px solid var(--bdr)">${dayH}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr)">${cells}</div>
  </div>`;
}

function toggleCalCat(cat){if(_calCatFilter.has(cat))_calCatFilter.delete(cat);else _calCatFilter.add(cat);}

async function clearAutoTasks(){
  const auto=db.tasks.filter(t=>t.auto_scheduled&&!t.done);
  if(!auto.length){toast('No auto-tasks to clear');return;}
  if(!confirm('Delete ALL '+auto.length+' auto-scheduled tasks?'))return;
  for(const t of auto){await remove('tasks',t.id);db.tasks=db.tasks.filter(x=>x.id!==t.id);}
  updateBadges();toast('Cleared '+auto.length+' auto-tasks');renderCalendar();
}

async function rebuildSchedule(){
  const withCat=db.companies.filter(c=>c.category&&CO_CATS[c.category]);
  if(!withCat.length){alert('No companies with A/B/C/D category');return;}
  const auto=db.tasks.filter(t=>t.auto_scheduled&&!t.done);
  if(!confirm('Rebuild schedule for '+withCat.length+' companies?\n\nWill delete '+auto.length+' existing auto-tasks.'))return;
  for(const t of auto){await remove('tasks',t.id);db.tasks=db.tasks.filter(x=>x.id!==t.id);}
  for(const co of withCat){
    const cat=CO_CATS[co.category];if(!cat)continue;
    const agent=co.assigned_agent&&co.assigned_agent!=='— not assigned —'?co.assigned_agent:(currentUser?.name||'');
    let d=new Date();d.setMonth(d.getMonth()+1);
    for(let i=0;i<12/cat.months;i++){
      const dow=d.getDay();if(dow===6)d.setDate(d.getDate()+2);else if(dow===0)d.setDate(d.getDate()+1);
      const due=[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
      const dup=db.tasks.some(t=>t.company_id===co.id&&t.due===due&&t.auto_scheduled&&!t.done);
      if(!dup){const task={id:uid(),company_id:co.id,company:co.name,title:'Contact with '+co.name+' (Cat. '+co.category+')',type:'Call',priority:co.category==='A'?'high':'medium',agent,due,done:false,auto_scheduled:true,created:today()};db.tasks.push(task);await persist('tasks',task);}
      d=new Date(d);d.setMonth(d.getMonth()+cat.months);
    }
  }
  updateBadges();toast('Schedule rebuilt — '+db.tasks.filter(t=>t.auto_scheduled&&!t.done).length+' tasks');renderCalendar();
}

function parseCoords(val){
  const status=$('loc-parse-status');const latEl=$('loc-lat');const lngEl=$('loc-lng');
  if(!val.trim()){if(status)status.textContent='';return;}
  let lat=null,lng=null;
  const dec=/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/.exec(val.trim());
  if(dec){lat=parseFloat(dec[1]);lng=parseFloat(dec[2]);}
  if(lat===null){
    const dms=/(\d+)[^\d]+(\d+)[^\d]+(\d+\.?\d*)[^\dNS]*([NS])[,\s]+(\d+)[^\d]+(\d+)[^\d]+(\d+\.?\d*)[^\dEW]*([EW])/i.exec(val);
    if(dms){lat=parseInt(dms[1])+parseInt(dms[2])/60+parseFloat(dms[3])/3600;lng=parseInt(dms[5])+parseInt(dms[6])/60+parseFloat(dms[7])/3600;if(dms[4].toUpperCase()==='S')lat=-lat;if(dms[8].toUpperCase()==='W')lng=-lng;}
  }
  if(lat!==null&&lng!==null&&lat>=-90&&lat<=90){
    if(latEl)latEl.value=lat.toFixed(6);if(lngEl)lngEl.value=lng.toFixed(6);
    if(status){status.textContent='✅ '+lat.toFixed(5)+', '+lng.toFixed(5);status.style.color='var(--green)';}
  } else if(val.length>4){if(status){status.textContent='Format not recognized';status.style.color='var(--red)';}}
}

function extractGPSfromFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    const view=new DataView(e.target.result);
    let offset=0,gps=null;
    try{
      if(view.getUint16(0)!==0xFFD8)return;
      offset=2;
      while(offset<view.byteLength){
        const marker=view.getUint16(offset);offset+=2;
        if(marker===0xFFE1){
          const len=view.getUint16(offset);
          const exif=new DataView(e.target.result,offset+2,len-2);
          const exifStr=Array.from({length:6},(_,i)=>String.fromCharCode(exif.getUint8(i))).join('');
          if(exifStr.startsWith('Exif')){gps=parseEXIF(e.target.result,offset+2,len-2);break;}
          offset+=len;
        }else if((marker&0xFF00)===0xFF00){offset+=view.getUint16(offset);}else break;
      }
    }catch(err){}
    if(gps&&gps.lat&&gps.lng){
      if($('loc-lat'))$('loc-lat').value=gps.lat.toFixed(6);
      if($('loc-lng'))$('loc-lng').value=gps.lng.toFixed(6);
      const status=$('loc-parse-status');
      if(status){status.textContent='✅ GPS from photo: '+gps.lat.toFixed(5)+', '+gps.lng.toFixed(5);status.style.color='var(--green)';}
    } else {
      const status=$('loc-parse-status');
      if(status){status.textContent='No GPS in this photo. Enter coordinates manually.';status.style.color='var(--red)';}
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseEXIF(buffer,start,len){
  try{
    const v=new DataView(buffer,start);
    const le=v.getUint16(6)===0x4949;
    const R=(o,s)=>s?v.getUint32(o+6,le):v.getUint16(o+6,le);
    const ifd=R(4,true)+6;const entries=v.getUint16(ifd,le);
    for(let i=0;i<entries;i++){
      const o=ifd+2+i*12;const tag=v.getUint16(o,le);
      if(tag===0x8825){
        const gpsOff=v.getUint32(o+8,le)+6;
        const gEntries=v.getUint16(gpsOff,le);
        let latRef='N',lngRef='E',latR=null,lngR=null;
        for(let j=0;j<gEntries;j++){
          const go=gpsOff+2+j*12;const gt=v.getUint16(go,le);
          if(gt===1)latRef=String.fromCharCode(v.getUint8(go+8));
          if(gt===3)lngRef=String.fromCharCode(v.getUint8(go+8));
          if(gt===2||gt===4){
            const dmsOff=v.getUint32(go+8,le)+6;
            const d=v.getUint32(dmsOff,le)/v.getUint32(dmsOff+4,le);
            const m=v.getUint32(dmsOff+8,le)/v.getUint32(dmsOff+12,le);
            const s=v.getUint32(dmsOff+16,le)/v.getUint32(dmsOff+20,le);
            if(gt===2)latR=d+m/60+s/3600;else lngR=d+m/60+s/3600;
          }
        }
        if(latR&&lngR)return{lat:latRef==='S'?-latR:latR,lng:lngRef==='W'?-lngR:lngR};
      }
    }
  }catch(e){}
  return null;
}
