<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wayland CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f1f5f9;--sur:#fff;--sur2:#f8fafc;
  --bdr:#e2e8f0;--bdr2:#cbd5e1;
  --text:#0f172a;--text-m:#64748b;--text-l:#94a3b8;
  --blue:#2563eb;--blue-lt:#eff6ff;--blue-dk:#1d4ed8;
  --green:#16a34a;--green-lt:#f0fdf4;
  --red:#dc2626;--red-lt:#fef2f2;
  --amber:#d97706;--amber-lt:#fffbeb;
  --purple:#7c3aed;--purple-lt:#f5f3ff;
  --gray:#6b7280;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08);
  --sh-lg:0 20px 40px rgba(0,0,0,.12);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --nav:220px;--top:52px;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);font-size:14px;color:var(--text);background:var(--bg)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--font)}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#nav{width:var(--nav);background:#0f172a;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#topbar{height:var(--top);background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 20px;flex-shrink:0;z-index:10}
#page{flex:1;overflow-y:auto;overflow-x:hidden}

/* Nav */
.nav-logo{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.nav-logo-icon{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo-text{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px}
.nav-logo-sub{font-size:10px;color:rgba(255,255,255,.35)}
.nav-section{padding:10px 0 2px}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.8px;color:rgba(255,255,255,.3);padding:6px 16px 3px;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 16px;color:rgba(255,255,255,.6);border:none;background:none;width:100%;text-align:left;font-size:13px;font-weight:500;transition:all .12s;border-radius:0;position:relative}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-btn.on{color:#fff;background:rgba(255,255,255,.13)}
.nav-btn i{font-size:16px;width:18px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;min-width:18px;text-align:center}
.nav-badge.red{background:var(--red)}
.nav-user{padding:10px 14px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto;display:flex;align-items:center;gap:9px;cursor:pointer;transition:background .12s}
.nav-user:hover{background:rgba(255,255,255,.05)}

/* Topbar */
.tb-title{font-size:15px;font-weight:700;white-space:nowrap}
.tb-search{flex:1;max-width:380px;position:relative}
.tb-search input{width:100%;padding:7px 12px 7px 34px;border:1.5px solid var(--bdr);border-radius:var(--r);background:var(--bg);font-size:13px;color:var(--text);outline:none;transition:all .15s;font-family:var(--font)}
.tb-search input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.tb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-l);font-size:15px;pointer-events:none}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-icon-btn{width:34px;height:34px;border:none;background:none;border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--text-m);font-size:18px;position:relative;transition:all .12s}
.tb-icon-btn:hover{background:var(--bg);color:var(--text)}
.notif-dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--sur)}

/* Page padding */
.page-pad{padding:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;border:1.5px solid var(--bdr);background:var(--sur);color:var(--text);transition:all .12s;white-space:nowrap;font-family:var(--font)}
.btn:hover{background:var(--bg);border-color:var(--bdr2)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dk);border-color:var(--blue-dk)}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}
.btn-ghost{border-color:transparent;background:transparent;padding:7px 10px}
.btn-ghost:hover{background:var(--bg);border-color:var(--bdr)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-icon{padding:7px;border-radius:var(--r)}
.btn-group{display:flex;border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.btn-group .btn{border:none;border-radius:0;border-right:1px solid var(--bdr)}
.btn-group .btn:last-child{border-right:none}
.btn-group .btn.on{background:var(--blue);color:#fff}

/* Cards */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);box-shadow:var(--sh)}
.card-head{padding:13px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600}
.card-body{padding:16px}

/* Avatar */
.av{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.av-sm{width:28px;height:28px;font-size:11px}
.av-md{width:36px;height:36px;font-size:13px}
.av-lg{width:48px;height:48px;font-size:18px}
.av-blue{background:var(--blue-lt);color:var(--blue)}
.av-green{background:var(--green-lt);color:var(--green)}
.av-purple{background:var(--purple-lt);color:var(--purple)}
.av-amber{background:var(--amber-lt);color:var(--amber)}
.av-gray{background:var(--sur2);color:var(--gray)}
.av-red{background:var(--red-lt);color:var(--red)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-lt);color:var(--blue)}
.b-green{background:var(--green-lt);color:var(--green)}
.b-red{background:var(--red-lt);color:var(--red)}
.b-amber{background:var(--amber-lt);color:var(--amber)}
.b-gray{background:var(--sur2);color:var(--gray)}
.b-purple{background:var(--purple-lt);color:var(--purple)}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);background:var(--sur2);border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--bdr);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl-hover tr:hover td{background:var(--blue-lt);cursor:pointer}
.tbl-hover tr:hover td:first-child{border-radius:0}

/* Form */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-m);margin-bottom:5px}
.fc{width:100%;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--sur);outline:none;transition:all .15s;font-family:var(--font)}
.fc:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fc:disabled,.fc[readonly]{background:var(--sur2);color:var(--text-m)}
textarea.fc{resize:vertical;min-height:80px;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);padding:16px}
.modal{background:var(--sur);border-radius:var(--r-xl);box-shadow:var(--sh-lg);width:100%;max-width:520px;max-height:90vh;display:flex;flex-direction:column;animation:modal-in .18s ease}
.modal-lg{max-width:660px}
@keyframes modal-in{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{width:28px;height:28px;border:none;background:none;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text-m);font-size:18px;transition:all .12s}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:var(--sur2);border-radius:0 0 var(--r-xl) var(--r-xl)}

/* Activity feed */
.act-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--bdr)}
.act-item:last-child{border-bottom:none}
.act-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.act-call{background:#dbeafe;color:#1d4ed8}
.act-meeting{background:#dcfce7;color:#15803d}
.act-whatsapp{background:#dcfce7;color:#16a34a}
.act-email{background:#f3e8ff;color:#7c3aed}
.act-proposal{background:#fef9c3;color:#a16207}
.act-visit{background:#e0f2fe;color:#0369a1}
.act-other{background:var(--sur2);color:var(--gray)}

/* Log CTA */
.log-cta{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(135deg,var(--blue-lt),#e0f2fe);border:1.5px dashed #93c5fd;border-radius:var(--r-lg);cursor:pointer;transition:all .15s;margin:16px}
.log-cta:hover{border-color:var(--blue);background:linear-gradient(135deg,#dbeafe,#bfdbfe)}
.log-cta-icon{width:40px;height:40px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.log-cta-title{font-size:14px;font-weight:600;color:var(--blue)}
.log-cta-sub{font-size:12px;color:#60a5fa;margin-top:1px}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.metric{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);padding:16px;position:relative;overflow:hidden;box-shadow:var(--sh)}
.metric::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.metric.green::after{background:var(--green)}
.metric.red::after{background:var(--red)}
.metric.amber::after{background:var(--amber)}
.metric.gray::after{background:var(--gray)}
.metric-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-m);margin-bottom:6px}
.metric-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px}
.metric-sub{font-size:12px;color:var(--text-l)}

/* Pipeline Kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;height:calc(100vh - 195px);padding:0 20px 20px}
.kanban::-webkit-scrollbar{height:6px}
.kanban::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.k-col{width:268px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sur2);border-radius:var(--r-lg);border:1px solid var(--bdr)}
.k-head{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--bdr)}
.k-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.k-stage{font-size:12px;font-weight:700}
.k-cnt{margin-left:auto;font-size:11px;color:var(--text-m)}
.k-val{font-size:11px;color:var(--text-m);font-weight:600}
.k-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.k-cards::-webkit-scrollbar{width:3px}
.k-cards::-webkit-scrollbar-thumb{background:var(--bdr)}
.k-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 12px;cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.k-card:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.k-card-co{font-weight:600;font-size:13px;margin-bottom:3px}
.k-card-model{font-size:12px;color:var(--text-m);margin-bottom:7px}
.k-card-amount{font-size:14px;font-weight:800;color:var(--blue)}
.k-card-meta{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:var(--text-l)}

/* Company card layout */
.co-wrap{display:grid;grid-template-columns:300px 1fr 280px;height:calc(100vh - 52px);overflow:hidden}
.co-left{overflow-y:auto;border-right:1px solid var(--bdr);background:var(--sur)}
.co-mid{overflow-y:auto;background:var(--bg)}
.co-right{overflow-y:auto;border-left:1px solid var(--bdr);background:var(--sur)}
.co-sec{padding:16px;border-bottom:1px solid var(--bdr)}
.co-sec:last-child{border-bottom:none}
.co-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-l);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--bdr)}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-m);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* Task row */
.task-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--blue-lt);margin:0 -12px;padding:10px 12px;border-radius:var(--r)}
.task-cb{width:18px;height:18px;border:2px solid var(--bdr2);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.task-cb:hover{border-color:var(--blue)}
.task-cb.done{background:var(--green);border-color:var(--green);color:#fff}

/* Calendar */
.cal-cell{min-height:90px;padding:4px;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr)}
.cal-event{font-size:10px;padding:2px 5px;margin-bottom:2px;border-radius:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid}
.cal-event:hover{opacity:.85}

/* Pipe summary */
.pipe-bar{display:flex;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;box-shadow:var(--sh)}
.pipe-bar-item{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--bdr)}
.pipe-bar-item:last-child{border-right:none}

/* Empty */
.empty{text-align:center;padding:40px 20px}
.empty i{font-size:44px;display:block;margin-bottom:12px;opacity:.2}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text-m);margin-bottom:16px}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:var(--sh-lg);z-index:9999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}

/* Search results */
#search-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r-lg);box-shadow:var(--sh-lg);z-index:200;display:none;overflow:hidden}
.sr-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .1s}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--blue-lt)}
.sr-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-l);width:64px;flex-shrink:0}

/* Drag */
.dragging{opacity:.4;cursor:grabbing}
.drop-over .k-cards{background:var(--blue-lt)!important;border:2px dashed var(--blue);border-radius:var(--r)}

/* Login */
#login{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e3a5f);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.login-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:var(--sh-lg)}

/* Mobile */
/* Bottom nav для мобиля */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;cursor:pointer;color:var(--text-l);border:none;background:none;flex:1;font-size:10px;font-weight:600;letter-spacing:.2px;transition:color .12s;min-width:0}
.bn-item.on,.bn-item:active{color:var(--blue)}
.bn-item i{font-size:22px}
.bn-badge{position:absolute;top:2px;right:50%;transform:translateX(50%);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--sur)}

@media(max-width:768px){
  :root{--nav:0px}
  #nav{position:fixed;left:-220px;top:0;bottom:0;width:220px;z-index:200;transition:left .22s}
  #nav.open{left:0}
  #mobile-toggle{display:flex!important}
  #bottom-nav{display:flex!important}
  /* Скрываем десктопный topbar search на мобиле, показываем только иконки */
  .tb-search{display:none}
  #topbar{padding:0 12px}
  /* Company card */
  .co-wrap{grid-template-columns:1fr}
  .co-left{border-right:none;border-bottom:1px solid var(--bdr);max-height:none}
  .co-right{border-left:none;border-top:1px solid var(--bdr)}
  .co-wrap{height:auto;overflow:visible}
  #page{overflow-y:auto}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .fr{grid-template-columns:1fr}
  .mob-metrics{grid-template-columns:1fr 1fr!important}
  #dash-grid{grid-template-columns:1fr!important}
  /* Reports metrics */
  #page .page-pad > div[style*="repeat(6"]{grid-template-columns:1fr 1fr!important}
  /* Pipeline summary bar */
  .pipe-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  /* Table horizontal scroll */
  .card{overflow-x:auto}
  /* Log CTA */
  .log-cta{margin:12px}
  /* Kanban scroll */
  .kanban{scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .k-col{scroll-snap-align:start}
  /* Modal bottom sheet */
  .modal{border-radius:20px 20px 0 0!important;max-height:88vh!important}
  .overlay{align-items:flex-end!important;padding:0!important}
  .modal{max-width:100%;margin:8px}
  .overlay{padding:8px;align-items:flex-end}
  .modal{border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:92vh}
  .page-pad{padding:12px}
  .kanban{padding:0 12px 16px}
  .pipe-bar{overflow-x:auto}
  .pipe-bar-item{min-width:90px}
  .tb-search{max-width:none;flex:1}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
        <i class="ti ti-building-factory" style="color:#fff;font-size:26px"></i>
      </div>

<script>
'use strict';

// ─── CONFIG ────────────────────────────────────────────────
const DEFAULT_API='https://script.google.com/macros/s/AKfycbxmQul0IzRTXaMOKgUu4iAvk8JKkF4E5fvgzi7qBUE_EPd_6FqnhhcOX4rz2mFaxa3gTQ/exec';
const CDN_CLOUD='datwudgmo', CDN_PRESET='wayland_crm';
const MAPTILER='ag2mYxKqDIOXJAKnt58I';

// ─── CONSTANTS ─────────────────────────────────────────────
const STAGES=['Lead','Qualified','Proposal','Negotiation','Won','Lost','Disqualified'];
const ACT_STAGES=['Lead','Qualified','Proposal','Negotiation'];
const SC={Lead:'#6b7280',Qualified:'#7c3aed',Proposal:'#d97706',Negotiation:'#2563eb',Won:'#16a34a',Lost:'#dc2626',Disqualified:'#94a3b8'};
const SBG={Lead:'#f9fafb',Qualified:'#f5f3ff',Proposal:'#fffbeb',Negotiation:'#eff6ff',Won:'#f0fdf4',Lost:'#fef2f2',Disqualified:'#f9fafb'};
const CATS={A:{label:'Monthly',mo:1,color:'#ef4444',bg:'#fee2e2'},B:{label:'Quarterly',mo:3,color:'#f59e0b',bg:'#fef3c7'},C:{label:'Bi-annually',mo:6,color:'#2563eb',bg:'#eff6ff'},D:{label:'Annually',mo:12,color:'#6b7280',bg:'#f9fafb'}};
const ACT_TYPES=['Call','Meeting','WhatsApp','Email','Proposal','Visit','Other'];
const ACT_ICONS={Call:'ti-phone',Meeting:'ti-users',WhatsApp:'ti-brand-whatsapp',Email:'ti-mail',Proposal:'ti-file-text',Visit:'ti-map-pin',Other:'ti-dots'};
const ACT_CLS={Call:'act-call',Meeting:'act-meeting',WhatsApp:'act-whatsapp',Email:'act-email',Proposal:'act-proposal',Visit:'act-visit',Other:'act-other'};
const WAYLAND=['Hitachi','Epiroc','Normet','Genie','Atlas Copco','Ingersoll Rand'];
const ALL_BRANDS=[...WAYLAND,'Caterpillar','Komatsu','Volvo','Liebherr','Doosan','John Deere','Hyundai','Sany','XCMG','Other'];
const BRAND_C={Hitachi:'#185FA5',Caterpillar:'#EF9F27',Komatsu:'#E24B4A',Volvo:'#1D9E75',Liebherr:'#7F77DD',Doosan:'#D4537E','John Deere':'#639922',Hyundai:'#D85A30'};
const INDUSTRIES=['Quarrying','Mining','Construction','Road Construction','Infrastructure','Industry','Agriculture','Rental','Utility','Other'];
const STATUSES=['Prospect','Active','Negotiating','Partner','Inactive','Cold'];
const DISQ_REASONS=['No target need','No budget','Non-target client','No decision maker','Wrong product / spec','Geography / logistics','Fake / test lead','Intermediary / competitor','Project not approved','Other'];
const LOST_REASONS=['Price too high','Chose competitor','Budget cut','Project cancelled','No response','Bought used equipment','Technical mismatch','Other'];

// ─── STATE ─────────────────────────────────────────────────
let API=localStorage.getItem('wcrm_url')||DEFAULT_API;
let db={companies:[],contacts:[],deals:[],tasks:[],activities:[],fleet:[],locations:[],photos:[],contracts:[],leads:[],users:[],agents:[],automations:[]};
let me=null; // current user
let page='dashboard';
let coPage=null; // open company id
let _mapInst=null,_mapLayer='Streets';
let _calView='month',_calOff=0,_calCats=new Set(['A','B','C','D']);
let _mapFilter=new Set(['Active','Prospect','Partner','Negotiating','Cold','Inactive']);
let _showComp=false,_showLost=false,_dataLoaded=false;
let _modalCb=null;

// ─── UTILS ─────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// Date utils — always safe, never "Invalid Date"
const parseLocalDate=s=>{
  if(!s||typeof s!=='string')return null;
  const p=s.slice(0,10).split('-');
  if(p.length<3)return null;
  const d=new Date(+p[0],+p[1]-1,+p[2]);
  return isNaN(d)?null:d;
};
const today=()=>{const n=new Date();return[n.getFullYear(),String(n.getMonth()+1).padStart(2,'0'),String(n.getDate()).padStart(2,'0')].join('-');};
const fmtD=s=>{const d=parseLocalDate(s);return d?d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}):'—';};
const fmtDS=s=>{const d=parseLocalDate(s);return d?d.toLocaleDateString('en',{day:'numeric',month:'short'}):'—';};
const fmtUSD=n=>{const v=+n||0;return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+v.toLocaleString();};
const ini=n=>{if(!n)return'?';const p=n.trim().split(/\s+/);return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();};
const avCls=n=>{const a=['av-blue','av-green','av-purple','av-amber','av-red'];let h=0;for(const c of(n||''))h=(h*31+c.charCodeAt(0))&0xffff;return a[h%a.length];};
const timeAgo=s=>{
  if(!s)return'—';
  const d=new Date(s);if(isNaN(d))return'—';
  const diff=Math.floor((Date.now()-d)/1000);
  if(diff<60)return'just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  const days=Math.floor(diff/86400);
  if(days<7)return days+'d ago';
  return fmtDS(s.slice?s.slice(0,10):s);
};
const dueFmt=due=>{
  if(!due||due==='Invalid Date'||!parseLocalDate(due))return'<span style="color:var(--text-l)">No date</span>';
  const t=today();
  if(due<t)return'<span style="color:var(--red);font-weight:600">'+fmtDS(due)+'</span>';
  if(due===t)return'<span style="color:var(--amber);font-weight:600">Today</span>';
  return'<span style="color:var(--text-m)">'+fmtDS(due)+'</span>';
};
const toast=(msg,ms=2800)=>{const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);};
const deb=(fn,ms)=>{let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};};

// Is real activity (not system log)
const isRealAct=a=>a.type&&!['stage','system','note'].includes(a.type)&&!((a.note||a.text||'').startsWith('Updated:'))&&!((a.note||a.text||'').startsWith('Stage changed'));

const AGENTS=()=>(db.users?.length?db.users.filter(u=>u.active!==false&&u.active!=='false'&&u.active!=='FALSE').map(u=>u.name):[me?.name||''].filter(Boolean));
const myDeals=()=>me?.role==='manager'?db.deals:db.deals.filter(d=>d.agent===me?.name);
const isActive=s=>ACT_STAGES.includes(s);

// ─── API ────────────────────────────────────────────────────
// Global loading indicator
let _apiCallsInFlight=0;
function showAPILoader(){if(++_apiCallsInFlight===1){const t=$('toast');if(t&&!t.classList.contains('show')){/* subtle indicator */}}}
function hideAPILoader(){_apiCallsInFlight=Math.max(0,_apiCallsInFlight-1);}

async function apiCall(params,retries=2){
  const url=API+'?payload='+encodeURIComponent(JSON.stringify(params));
  for(let i=0;i<=retries;i++){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(15000)});
      const d=await r.json();
      if(!d.ok)throw new Error(d.error||'API error');
      return d.data;
    }catch(e){if(i===retries)throw e;await new Promise(r=>setTimeout(r,1000*(i+1)));}
  }
}
async function persist(sheet,row){
  if(!row.id)row.id=uid();
  try{await apiCall({action:'upsert',sheet,row});}
  catch(e){toast('⚠️ Save error: '+e.message,4000);throw e;}
  return row;
}
async function del(sheet,id){await apiCall({action:'delete',sheet,id});}

async function loadAll(){
  const data=await apiCall({action:'readAll'});
  Object.keys(data).forEach(k=>{if(db[k]!==undefined)db[k]=Array.isArray(data[k])?data[k]:[];});
  // Normalize
  db.tasks=db.tasks.map(t=>({...t,done:t.done===true||t.done==='true'||t.done==='TRUE',auto_scheduled:t.auto_scheduled===true||t.auto_scheduled==='true'||t.auto_scheduled==='TRUE',amount:+t.amount||0}));
  db.deals=db.deals.map(d=>({...d,amount:+d.amount||0,probability:+d.probability||0}));
  db.users=db.users.map(u=>({...u,active:u.active!==false&&u.active!=='false'&&u.active!=='FALSE'}));
  _dataLoaded=true;
  updateBadges();
}

// ─── AUTH ────────────────────────────────────────────────────
function simpleHash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return Math.abs(h).toString(36);}

async function doLogin(){
  const name=($('l-name').value||'').trim();
  const pass=$('l-pass').value;
  if(!name){showErr('Enter your name');return;}
  // Если пользователи не загружены - грузим сначала
  if(!db.users.length){
    showErr('Connecting…');
    try{await loadAll();}catch(e){showErr('Connection failed: '+e.message);return;}
  }
  const u=db.users.find(x=>x.name.toLowerCase()===name.toLowerCase()&&(simpleHash(pass)===x.password_hash||pass===x.password_hash));
  if(!u){showErr('Wrong name or password');return;}
  if(!u.active){showErr('Account is disabled');return;}
  me=u;
  u.last_login=today();
  persist('users',{...u});
  localStorage.setItem('wcrm_s',JSON.stringify({id:u.id,name:u.name,role:u.role}));
  startApp();
}

function showErr(msg){const el=$('l-err');el.textContent=msg;el.style.display='block';}

async function connectApi(){
  const url=($('l-api').value||'').trim();
  if(!url.includes('script.google.com')){showErr('Enter valid Apps Script URL');return;}
  API=url;localStorage.setItem('wcrm_url',url);
  showErr('Connecting…');
  try{await loadAll();$('l-err').style.display='none';}catch(e){showErr('Failed: '+e.message);}
}

function logout(){
  localStorage.removeItem('wcrm_s');me=null;
  $('app').style.display='none';$('login').style.display='flex';
  $('user-menu').style.display='none';
}

function toggleUserMenu(){
  const m=$('user-menu');m.style.display=m.style.display==='none'?'block':'none';
  $('um-name').textContent=me?.name||'';
  $('um-role').textContent=me?.role==='manager'?'Sales Manager':'Sales Rep';
}

// ─── STARTUP ────────────────────────────────────────────────
async function init(){
  const urlP=new URLSearchParams(location.search);
  const apiUrl=urlP.get('api');
  if(apiUrl){API=decodeURIComponent(apiUrl);localStorage.setItem('wcrm_url',API);}
  // Показываем экран загрузки
  $('login').style.display='none';
  document.body.insertAdjacentHTML('beforeend','<div id="boot-loader" style="position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e3a5f);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px"><div style="width:52px;height:52px;background:var(--blue);border-radius:14px;display:flex;align-items:center;justify-content:center"><i class="ti ti-building-factory" style="color:#fff;font-size:26px"></i></div><div style="color:#fff;font-size:16px;font-weight:700">Wayland CRM</div><i class="ti ti-loader-2 spin" style="color:rgba(255,255,255,.5);font-size:28px"></i></div>');
  try{await loadAll();}catch(e){console.warn('Init load:',e.message);}
  const bootEl=document.getElementById('boot-loader');if(bootEl)bootEl.remove();
  const sess=localStorage.getItem('wcrm_s');
  if(sess){
    try{
      const s=JSON.parse(sess);
      const u=db.users.find(x=>x.id===s.id&&x.active);
      if(u){me=u;startApp();return;}
    }catch(e){}
    localStorage.removeItem('wcrm_s');
  }
  $('login').style.display='flex';
}

function startApp(){
  $('login').style.display='none';
  $('app').style.display='flex';
  $('u-av').textContent=ini(me.name);
  $('u-name').textContent=me.name.split(' ').slice(0,2).join(' ');
  $('u-role').textContent=me.role==='manager'?'Sales Manager':'Sales Rep';
  if(window.innerWidth<=768){
    $('mobile-toggle').style.display='flex';
    $('bottom-nav').style.display='flex';
    $('mob-search-btn').style.display='flex';
    // Добавляем отступ снизу для контента
    $('page').style.paddingBottom='80px';
  }
  window.addEventListener('resize',()=>{
    const mob=window.innerWidth<=768;
    $('mobile-toggle').style.display=mob?'flex':'none';
    $('mob-search-btn').style.display=mob?'flex':'none';
    const bn=$('bottom-nav');if(bn)bn.style.display=mob?'flex':'none';
    const ts=document.querySelector('.tb-search');
    if(ts){ts.style.display=mob?'none':'';ts.style.position='';ts.style.top='';ts.style.left='';ts.style.right='';ts.style.zIndex='';}
    const pp=$('page');if(pp)pp.style.paddingBottom=mob?'80px':'';
    if(!mob)$('nav').classList.remove('open');
  });
  if(_dataLoaded){go('dashboard');}
  else{
    $('page').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:12px"><i class="ti ti-loader-2 spin" style="font-size:40px;color:var(--blue)"></i><div style="font-size:14px;color:var(--text-m)">Loading data…</div></div>';
    loadAll().then(()=>{_dataLoaded=true;go('dashboard');}).catch(e=>{toast('Load error: '+e.message);go('dashboard');});
  }
}

function go(p,el){
  page=p;
  coPage=null; // always reset when navigating
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  (el||document.querySelector(`.nav-btn[data-page="${p}"]`))?.classList.add('on');
  $('tb-right').innerHTML='<button class="tb-icon-btn" onclick="toggleNotif()" id="notif-btn"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>';

// ─── SEARCH ────────────────────────────────────────────────
// ── Транслитерация для поиска ───────────────────────────────
const _CYR2LAT={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'j',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'kh',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya'};
const _LAT2CYR={a:'а',b:'б',v:'в',g:'г',d:'д',e:'е',z:'з',i:'и',j:'й',k:'к',l:'л',m:'м',n:'н',o:'о',p:'п',r:'р',s:'с',t:'т',u:'у',f:'ф',y:'у'};
// Армянский → латиница (базовые)
const _ARM2LAT={ա:'a',բ:'b',գ:'g',դ:'d',ե:'e',զ:'z',է:'e',ը:'e',թ:'t',ժ:'zh',ի:'i',լ:'l',խ:'kh',ծ:'ts',կ:'k',հ:'h',ձ:'dz',ղ:'gh',ճ:'ch',մ:'m',յ:'y',ն:'n',շ:'sh',ո:'vo',չ:'ch',պ:'p',ջ:'j',ռ:'r',ս:'s',վ:'v',տ:'t',ր:'r',ց:'ts',ու:'u',փ:'p',ք:'k',և:'ev',օ:'o',ֆ:'f'};
function _translit(s){
  if(!s)return '';
  s=s.toLowerCase();
  // армянский → латиница
  let r='';
  for(let i=0;i<s.length;i++){
    const two=s[i]+(s[i+1]||'');
    if(_ARM2LAT[two]){r+=_ARM2LAT[two];i++;continue;}
    r+=_ARM2LAT[s[i]]||_CYR2LAT[s[i]]||s[i];
  }
  return r;
}
function _latFromCyr(s){return _translit(s);}
function _cyrFromLat(s){
  if(!s)return '';
  s=s.toLowerCase();
  return s.split('').map(c=>_LAT2CYR[c]||c).join('');
}
function _matches(text,q){
  if(!text)return false;
  const t=text.toLowerCase(), tl=_translit(text);
  const ql=q.toLowerCase(), qtl=_translit(q), qCyr=_cyrFromLat(q);
  return t.includes(ql)||t.includes(qCyr)||tl.includes(qtl)||tl.includes(ql);
}
function doSearch(q){
  if(!q.trim()){hideDrop();return;}
  const res=[];
  db.companies.filter(c=>_matches(c.name,q)||_matches(c.city,q)).slice(0,4).forEach(c=>res.push({type:'Company',label:c.name,sub:c.industry||c.city||'',id:c.id,page:'companies'}));
  db.contacts.filter(c=>_matches((c.first_name||'')+' '+(c.last_name||''),q)||(c.phone||'').includes(q)).slice(0,3).forEach(c=>res.push({type:'Contact',label:((c.first_name||'')+' '+(c.last_name||'')).trim(),sub:c.company||'',id:c.company_id,page:'companies'}));
  db.deals.filter(d=>_matches(d.company,q)||_matches(d.model,q)).slice(0,3).forEach(d=>res.push({type:'Deal',label:d.company,sub:(d.model||'')+'  '+fmtUSD(d.amount),id:d.id,page:'pipeline'}));
  const el=$('search-drop');
  el.innerHTML=res.length?res.map(r=>`<div class="sr-item" onclick="srClick('${r.page}','${r.id}')"><span class="sr-type">${r.type}</span><div><div style="font-weight:600">${r.label}</div><div style="font-size:11px;color:var(--text-m)">${r.sub}</div></div></div>`).join(''):'<div style="padding:12px 14px;color:var(--text-l);font-size:13px">No results</div>';
  el.style.display='block';
}
function showDrop(){if($('s-input').value.trim())$('search-drop').style.display='block';}
function hideDrop(){$('search-drop').style.display='none';}
function srClick(p,id){
  hideDrop();$('s-input').value='';
  if(p==='companies'){go('companies');openCo(id);}
  else go(p);
}

// ─── MODAL ENGINE ────────────────────────────────────────────
function showModal(title,body,onSave,saveLabel,extraBtns){
  $('m-title').textContent=title;
  $('m-body').innerHTML=body;
  _modalCb=onSave;
  const foot=$('m-foot');
  foot.innerHTML='<button class="btn" onclick="closeModal()">Cancel</button>';
  if(extraBtns)extraBtns.forEach(b=>{const btn=document.createElement('button');btn.className='btn'+(b.danger?' btn-danger':b.success?' btn-success':'');btn.textContent=b.label;btn.onclick=b.action;foot.appendChild(btn);});
  if(onSave){const btn=document.createElement('button');btn.className='btn btn-primary';btn.id='m-save';btn.innerHTML='<i class="ti ti-check"></i> '+(saveLabel||'Save');btn.onclick=saveM;foot.appendChild(btn);}
  else foot.innerHTML='<button class="btn" onclick="closeModal()">Close</button>';
  $('ov').style.display='flex';
  setTimeout(()=>$('m-body').querySelector('input,textarea,select')?.focus(),60);
}
async function saveM(){
  if(!_modalCb)return;
  const btn=$('m-save');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin"></i> Saving…';}
  try{const r=await _modalCb();if(r!==false)closeModal();}
  catch(e){toast('Error: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> Save';}}
}
function closeModal(){$('ov').style.display='none';_modalCb=null;}
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();$('s-input')?.focus();}
  if(e.key==='Escape'){closeModal();hideDrop();$('user-menu').style.display='none';$('notif-panel').style.display='none';}
});

    </select>

    <button class="tb-icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>`;
  let myD=myDeals();
  if(_pipeAgent)myD=myD.filter(d=>d.agent===_pipeAgent);
  if(_pipeSearch){const q=_pipeSearch;myD=myD.filter(d=>_matches(d.company,q)||_matches(d.model,q)||_matches(d.agent,q));}

    else myD=myD.filter(d=>d.stage===_pipeStage);

  const active=myD.filter(d=>isActive(d.stage));

  const pipeBar=`<div class="pipe-bar" style="margin:16px 20px 0">
    ${ACT_STAGES.map(s=>{const ds=active.filter(d=>d.stage===s);return`<div class="pipe-bar-item">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:${SC[s]}">${s}</div>
      <div style="font-size:20px;font-weight:800;color:${SC[s]};margin:3px 0">${ds.length}</div>
      <div style="font-size:11px;color:var(--text-l)">${ds.length?fmtUSD(ds.reduce((a,d)=>a+d.amount,0)):''}</div>
    </div>`}).join('')}
  </div>`;
  const kanban=`<div class="kanban" style="padding:14px 20px">
    ${ACT_STAGES.map(s=>{

  const cDate=d.created?new Date(d.created):null;const days=cDate&&!isNaN(cDate)?Math.floor((Date.now()-cDate)/86400000):0;
  const stale=days>30;
  return`<div class="k-card" draggable="true" style="border-left-color:${SC[d.stage]}"
    ondragstart="_dragId='${d.id}';event.target.classList.add('dragging')"

    onclick="openDeal('${d.id}')">

    <div class="k-card-model">${d.model||'—'}</div>

      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px">${d.agent||'—'}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${d.probability&&d.probability!=={Lead:10,Qualified:25,Proposal:50,Negotiation:75}[d.stage]?`<span style="font-size:10px;background:var(--blue-lt);color:var(--blue);padding:1px 5px;border-radius:10px">${d.probability}%</span>`:''}

      </div>

  </div>`;
}

let _dragId=null;
async function dropToStage(stage,e){
  e.preventDefault();document.querySelectorAll('.k-col').forEach(c=>c.classList.remove('drop-over'));
  if(!_dragId)return;
  const deal=db.deals.find(d=>d.id===_dragId);_dragId=null;
  if(!deal||deal.stage===stage)return;
  await moveToStage(deal,stage);
}

async function moveToStage(deal,stage){
  const prev=deal.stage;
  // Записываем историю стадий
  if(!deal.stage_history)deal.stage_history=[];
  deal.stage_history.push({from:prev,to:stage,date:today(),by:me?.name||''});
  if(stage==='Won'){
    if(!confirm('Move to WON?\n\n• Equipment will be added to '+deal.company+' fleet\n• Company status → Active'))return;
  }
  if(stage==='Lost'){
    const r=await pickReason('Lost',LOST_REASONS,'Competitor');
    if(!r)return;
    deal.lost_reason=r.reason;deal.competitor=r.extra;deal.competitor_price=r.price||0;
  }
  if(stage==='Disqualified'){
    const r=await pickReason('Disqualify',DISQ_REASONS);
    if(!r)return;
    deal.disq_reason=r.reason;deal.disq_comment=r.comment||'';
  }
  deal.stage=stage;
  deal.probability={Lead:10,Qualified:25,Proposal:50,Negotiation:75,Won:100,Lost:0,Disqualified:0}[stage]||0;
  await persist('deals',deal);
  if(stage==='Won'&&prev!=='Won')await onWon(deal);
  if(stage==='Lost'&&prev!=='Lost')await onLost(deal);
  renderPipeline();updateBadges();
}

function pickReason(label,reasons,extraLabel){
  return new Promise(res=>{
    const ov=document.createElement('div');ov.className='overlay';
    ov.innerHTML=`<div class="modal" style="max-width:420px">
      <div class="modal-head"><div class="modal-title">Mark as ${label}</div><button class="modal-close" onclick="this.closest('.overlay').remove();res(null)"><i class="ti ti-x"></i></button></div>
      <div class="modal-body">
        <div class="fg"><label class="fl">Reason *</label><select class="fc" id="pr-reason"><option value="">— select —</option>${reasons.map(r=>`<option>${r}</option>`).join('')}</select></div>
        ${extraLabel?`<div class="fg"><label class="fl">${extraLabel}</label><input class="fc" id="pr-extra" placeholder="${extraLabel}…"></div>`:''}
        ${label==='Lost'?`<div class="fg" id="pr-price-wrap" style="display:none"><label class="fl">Competitor Price ($)</label><input class="fc" id="pr-price" type="number"></div>`:''}
        ${label==='Disqualify'?`<div class="fg"><label class="fl">Comment (optional)</label><input class="fc" id="pr-comment" placeholder="What did you find out?"></div>`:''}
      </div>
      <div class="modal-foot"><button class="btn" onclick="this.closest('.overlay').remove()">Cancel</button><button class="btn btn-danger" id="pr-ok">Confirm</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#pr-reason')?.addEventListener('change',function(){
      const pw=ov.querySelector('#pr-price-wrap');if(pw)pw.style.display=this.value==='Price too high'?'block':'none';
    });
    ov.querySelector('#pr-ok').onclick=()=>{
      const r=ov.querySelector('#pr-reason').value;
      if(!r){alert('Select a reason');return;}
      ov.remove();
      res({reason:r,extra:ov.querySelector('#pr-extra')?.value||'',price:+ov.querySelector('#pr-price')?.value||0,comment:ov.querySelector('#pr-comment')?.value||''});
    };
    ov.querySelector('.modal-close').onclick=()=>{ov.remove();res(null);};
  });
}

        <button class="btn btn-sm btn-success" onclick="closeModal();moveToStage(db.deals.find(x=>x.id==='${id}'),'Won')">✓ Won</button>
        <button class="btn btn-sm" style="color:var(--red)" onclick="closeModal();moveToStage(db.deals.find(x=>x.id==='${id}'),'Lost')">✗ Lost</button>
      </div>
    </div>`:''}
  `,null,null,[
    {label:'Edit',action:()=>{closeModal();openDealForm(d.company_id,id);}},

// ─── COMPANIES ───────────────────────────────────────────────
let _coFilter='',_coSort={col:'name',dir:1},_coStatusF='',_coCatF='';

function renderCompanies(){
  $('tb-right').innerHTML=`<button class="btn" onclick="exportCompanies()" title="Export CSV"><i class="ti ti-download"></i></button><button class="btn btn-primary" onclick="openCoForm()"><i class="ti ti-plus"></i> Company</button><button class="tb-icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>`;

  $('page').innerHTML=`<div class="page-pad">
    <div style="display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap">
      <div style="position:relative;flex:1;min-width:220px">

      </select>
      <select class="fc" style="width:120px" onchange="_coCatF=this.value;renderCoRows()">
        <option value="">All categories</option>${['A','B','C','D'].map(c=>`<option value="${c}" ${_coCatF===c?'selected':''}>Cat. ${c} — ${CATS[c]?.label||c}</option>`).join('')}
      </select>
    </div>
    <div class="card" style="overflow:hidden">
      <div id="co-count-bar" style="padding:7px 14px;border-bottom:1px solid var(--bdr);background:var(--sur2);font-size:12px;color:var(--text-m)">Loading…</div>
      <table class="tbl tbl-hover">
        <thead><tr>
          <th onclick="sortCo('name')" style="cursor:pointer">Company <i class="ti ti-arrows-sort"></i></th>
          <th>Industry</th><th>Cat.</th><th>City</th>
          <th style="text-align:center">Contacts</th>
          <th style="text-align:center">Deals</th>

}

function sortCo(col){if(_coSort.col===col)_coSort.dir*=-1;else{_coSort.col=col;_coSort.dir=1;}renderCoRows();}

function renderCoRows(){
  // Если данные ещё не загружены
  if(!_dataLoaded){
    const el=$('co-rows');
    if(el)el.innerHTML='<tr><td colspan="10" style="text-align:center;padding:32px"><i class="ti ti-loader-2 spin" style="font-size:24px;color:var(--blue)"></i><div style="margin-top:8px;color:var(--text-m)">Loading…</div></td></tr>';
    loadAll().then(()=>{_dataLoaded=true;renderCoRows();}).catch(e=>toast('Load error: '+e.message));
    return;
  }
  const q=_coFilter;
  let list=db.companies.filter(c=>{
    if(_coStatusF&&c.status!==_coStatusF)return false;
    if(_coCatF&&c.category!==_coCatF)return false;
    if(q&&!_matches(c.name,q)&&!_matches(c.city,q)&&!_matches(c.industry,q))return false;
    return true;
  }).sort((a,b)=>(a[_coSort.col]||'').localeCompare(b[_coSort.col]||'')*_coSort.dir);
  const t=today();
  // Update count
  const countBar=document.getElementById('co-count-bar');
  if(countBar){const total=db.companies.length;const shown=list.length;countBar.textContent=shown===total?`${total} companies`:`${shown} of ${total} companies`;}
  $('co-rows').innerHTML=list.map(co=>{
    const contacts=db.contacts.filter(c=>c.company_id===co.id).length;
    const deals=db.deals.filter(d=>d.company_id===co.id&&isActive(d.stage)).length;
    const fleet=db.fleet.filter(f=>f.company_id===co.id&&f.condition!=='Competitor').length;
    const lastAct=db.activities.filter(a=>a.company_id===co.id&&isRealAct(a)).sort((a,b)=>(b.created||b.date||'').localeCompare(a.created||a.date||'')).shift();
    const cat=co.category,cc=CATS[cat]?.color||'';
    const sb={Active:'b-green',Prospect:'b-blue',Negotiating:'b-amber',Partner:'b-purple',Inactive:'b-gray',Cold:'b-gray'}[co.status]||'b-gray';
    const _lad=lastAct?new Date(lastAct.created||lastAct.date):null;const daysSince=_lad&&!isNaN(_lad)?Math.floor((Date.now()-_lad)/86400000):999;
    const contactColor=daysSince<=7?'var(--green)':daysSince<=30?'var(--text)':daysSince<=90?'var(--amber)':'var(--red)';
    return`<tr onclick="openCo('${co.id}')">
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="av av-sm ${avCls(co.name)}">${ini(co.name)}</div>
        <div><div style="font-weight:600">${co.name}</div><div style="font-size:11px;color:var(--text-m)">${co.assigned_agent||''}</div></div>
      </div></td>
      <td style="color:var(--text-m);font-size:12px">${co.industry||'—'}</td>
      <td>${cat?`<span class="badge" style="background:${CATS[cat]?.bg||'#f1f5f9'};color:${cc}">${cat}</span>`:'—'}</td>
      <td style="color:var(--text-m)">${co.city||'—'}</td>
      <td style="text-align:center">${contacts||'—'}</td>
      <td style="text-align:center">${deals?`<span style="color:var(--blue);font-weight:600">${deals}</span>`:'—'}</td>
      <td style="text-align:center">${fleet?`<span style="color:var(--green)">${fleet}</span>`:'—'}</td>
      <td style="font-size:12px;color:${contactColor}" title="${lastAct?('Last: '+(lastAct.type||'')+(lastAct.agent?' by '+lastAct.agent:'')):'No activity'}">${lastAct?timeAgo(lastAct.created||lastAct.date):'<span style="color:var(--text-l)">Never</span>'}</td>
      <td><span class="badge ${sb}">${co.status||'Prospect'}</span></td>
      <td onclick="event.stopPropagation()" style="width:80px">
        <div style="display:flex;gap:4px;opacity:0;transition:opacity .15s" class="row-act">
          <button class="btn btn-xs btn-primary" title="Log Activity" onclick="openLogAct('${co.id}')"><i class="ti ti-phone"></i></button>
          <button class="btn btn-xs" title="New Deal" onclick="openDealForm('${co.id}')"><i class="ti ti-plus"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('')||`<tr><td colspan="10" style="text-align:center;padding:32px"><div style="font-size:32px;opacity:.15;margin-bottom:8px">🏢</div><div style="font-weight:600;color:var(--text)">No companies found</div><div style="font-size:12px;color:var(--text-m);margin-top:4px">Try different search or filters</div></td></tr>`;
}

function actFeed(acts,coId){
  if(!acts.length)return`<div class="empty" style="padding:32px">
    <i class="ti ti-clock"></i><div class="empty-title">No activity yet</div>
    <div class="empty-sub">Log calls, meetings and conversations</div>
    <button class="btn btn-primary" onclick="openLogAct('${coId}')"><i class="ti ti-phone"></i> Log First Activity</button>
  </div>`;
  return acts.map(a=>`<div class="act-item">
    <div class="act-icon ${ACT_CLS[a.type]||'act-other'}"><i class="ti ${ACT_ICONS[a.type]||'ti-dots'}"></i></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;color:var(--text-m);margin-bottom:4px">
        <strong style="color:var(--text)">${a.type}</strong>
        ${a.contact_name?' · '+a.contact_name:''}
        ${a.direction?' ('+a.direction+')':''}
        · ${timeAgo(a.created||a.date)}
        · ${a.agent||''}
      </div>
      ${a.note?`<div style="font-size:13px;line-height:1.55;color:var(--text)">${a.note}</div>`:''}
      ${a.next_step?`<div style="font-size:12px;color:var(--blue);margin-top:6px;padding:6px 10px;background:var(--blue-lt);border-radius:var(--r);border-left:3px solid var(--blue)"><i class="ti ti-arrow-right" style="font-size:11px"></i> Next: <strong>${a.next_step}</strong>${a.next_date?' · '+fmtDS(a.next_date):''}</div>`:''}
    </div>
    <button class="btn btn-xs btn-ghost" style="flex-shrink:0;color:var(--text-l)" onclick="delAct('${a.id}','${coId}')"><i class="ti ti-x"></i></button>
  </div>`).join('')+`<div style="text-align:center;padding:20px 0 30px">
    <button class="btn btn-primary" style="padding:10px 28px" onclick="openLogAct('${coId}')"><i class="ti ti-phone"></i> Log Activity</button>
  </div>`;
}

function filterActs(types,coId,el){
  document.querySelectorAll('#co-tabs .tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  const all=db.activities.filter(a=>a.company_id===coId&&isRealAct(a)).sort((a,b)=>(b.created||b.date||'').localeCompare(a.created||a.date||''));
  const filtered=types==='all'?all:all.filter(a=>types.split(',').includes(a.type));
  $('co-feed').innerHTML=actFeed(filtered,coId);
}

async function delAct(id,coId){
  if(!confirm('Delete this activity record?'))return;
  await del('activities',id);db.activities=db.activities.filter(a=>a.id!==id);
  openCo(coId);
}

function initMiniMap(cId,locs){
  const el=document.getElementById(cId);if(!el)return;
  const valid=locs.filter(l=>l.lat&&l.lng);if(!valid.length)return;
  const map=L.map(cId,{attributionControl:false,zoomControl:false}).setView([+valid[0].lat,+valid[0].lng],12);
  L.tileLayer('https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key='+MAPTILER,{maxZoom:20}).addTo(map);
  valid.forEach(l=>L.marker([+l.lat,+l.lng]).addTo(map).bindPopup(l.name||l.type||''));
  if(valid.length>1)map.fitBounds(valid.map(l=>[+l.lat,+l.lng]),{padding:[10,10]});
}

  const tod=today();
  let list=db.tasks.filter(t=>{
    if(_tkAgent&&t.agent!==_tkAgent)return false;
    if(_tkSearch&&!_matches(t.title,_tkSearch)&&!_matches(t.company,_tkSearch))return false;
    if(_tkFilter==='open')return !t.done;
    if(_tkFilter==='today')return !t.done&&t.due===tod;
    if(_tkFilter==='overdue')return !t.done&&t.due&&t.due<tod;
    if(_tkFilter==='done')return t.done;
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    return (a.due||'9999').localeCompare(b.due||'9999');
  });

  const pc={high:'var(--red)',medium:'var(--amber)',low:'var(--green)'};
  const overdue=list.filter(t=>!t.done&&t.due&&t.due<tod).length;
  const todayCount=list.filter(t=>!t.done&&t.due===tod).length;

      <div class="metric${overdue?' red':''}" style="flex:1;padding:12px 16px">
        <div class="metric-label">Overdue</div>

      <div class="metric amber" style="flex:1;padding:12px 16px">
        <div class="metric-label">Due Today</div>
        <div class="metric-val" style="font-size:20px;color:var(--amber)">${todayCount}</div>
      </div>
      <div class="metric" style="flex:1;padding:12px 16px">
        <div class="metric-label">Total Open</div>

          <th>Due</th>
          <th>Priority</th>
          <th>Agent</th>
          <th></th>
        </tr></thead>

          const isOv=!t.done&&t.due&&t.due<tod;
          const isTod=!t.done&&t.due===tod;

              <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone('${t.id}',this.checked)" style="cursor:pointer;width:16px;height:16px">

            <td style="color:${isOv?'var(--red)':isTod?'var(--amber)':'var(--text-m)'};font-weight:${isOv||isTod?600:400}">

        </tbody>
      </table>
    </div>
  </div>`;
}

async function toggleTaskDone(id,done){
  const t=db.tasks.find(x=>x.id===id);if(!t)return;
  t.done=done;await persist('tasks',{...t});
  updateBadges();renderTasks();
}
async function deleteTask(id){
  if(!confirm('Delete task?'))return;
  await del('tasks',id);db.tasks=db.tasks.filter(x=>x.id!==id);
  updateBadges();renderTasks();toast('Task deleted');
}

  $('tb-right').innerHTML=`

  const agentF=$('cal-a')?.value||'';

    const co=db.companies.find(c=>c.id===t.company_id);
    return!co?.category||_calCats.has(co.category);
  });
  const now=new Date();
  const nMo=_calView==='quarter'?3:1;
  const startM=new Date(now.getFullYear(),now.getMonth()+_calOff,1);

async function clearAutoTasks(){

  if(!auto.length){toast('No auto-tasks');return;}
  if(!confirm('Delete '+auto.length+' auto-scheduled tasks?'))return;
  for(const t of auto){await del('tasks',t.id);db.tasks=db.tasks.filter(x=>x.id!==t.id);}
  updateBadges();toast('Cleared '+auto.length+' tasks');renderCalendar();
}

async function rebuildSched(){
  const withCat=db.companies.filter(c=>c.category&&CATS[c.category]);
  if(!withCat.length){alert('No companies with A/B/C/D category');return;}
  const auto=db.tasks.filter(t=>t.auto_scheduled&&!t.done);
  if(!confirm('Rebuild schedule for '+withCat.length+' companies?\nWill delete '+auto.length+' existing auto-tasks.'))return;
  for(const t of auto){await del('tasks',t.id);db.tasks=db.tasks.filter(x=>x.id!==t.id);}
  let created=0;
  for(const co of withCat){
    const cat=CATS[co.category];if(!cat)continue;
    const agent=co.assigned_agent&&co.assigned_agent!=='— not assigned —'?co.assigned_agent:(me?.name||'');
    const baseDate=new Date();baseDate.setMonth(baseDate.getMonth()+1);
    for(let i=0;i<Math.round(12/cat.mo);i++){
      const d=new Date(baseDate.getFullYear(),baseDate.getMonth()+i*cat.mo,baseDate.getDate());
      const dow=d.getDay();if(dow===6)d.setDate(d.getDate()+2);else if(dow===0)d.setDate(d.getDate()+1);
      const due=[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('-');
      if(!db.tasks.some(t=>t.company_id===co.id&&t.due===due&&t.auto_scheduled&&!t.done)){
        const tk={id:uid(),company_id:co.id,company:co.name,title:'Contact with '+co.name+' (Cat. '+co.category+')',type:'Call',priority:co.category==='A'?'high':'medium',agent,due,done:false,auto_scheduled:true,created:today()};
        db.tasks.push(tk);await persist('tasks',tk);created++;
      }
    }
  }
  updateBadges();toast('✅ Schedule rebuilt — '+created+' tasks created');renderCalendar();
}

function parseCoords(val){
  const s=$('lf-status'),la=$('lf-lat'),lo=$('lf-lng');
  if(!val.trim()){if(s)s.textContent='';return;}
  let lat=null,lng=null;
  const dec=/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/.exec(val.trim());
  if(dec){lat=+dec[1];lng=+dec[2];}
  if(lat===null){
    const dms=/(\d+)[^\d]+(\d+)[^\d]+(\d+\.?\d*)[^\dNS]*([NS])[,\s]+(\d+)[^\d]+(\d+)[^\d]+(\d+\.?\d*)[^\dEW]*([EW])/i.exec(val);
    if(dms){lat=+dms[1]+ +dms[2]/60+ +dms[3]/3600;lng=+dms[5]+ +dms[6]/60+ +dms[7]/3600;if(dms[4].toUpperCase()==='S')lat=-lat;if(dms[8].toUpperCase()==='W')lng=-lng;}
  }
  if(lat!==null&&!isNaN(lat)&&lat>=-90&&lat<=90&&lng>=-180&&lng<=180){
    if(la)la.value=lat.toFixed(6);if(lo)lo.value=lng.toFixed(6);
    if(s){s.textContent='✅ '+lat.toFixed(5)+', '+lng.toFixed(5);s.style.color='var(--green)';}
  } else if(val.length>5){if(s){s.textContent='Format not recognized. Try: 40.5096, 44.4521';s.style.color='var(--red)';}}
}

function extractGPS(file){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const v=new DataView(e.target.result);
      if(v.getUint16(0)!==0xFFD8)return;
      let off=2;
      while(off<v.byteLength-2){
        const mk=v.getUint16(off);off+=2;
        if(mk===0xFFE1){
          const len=v.getUint16(off);
          const ex=new DataView(e.target.result,off+2,len-2);
          if(String.fromCharCode(...Array.from({length:4},(_,i)=>ex.getUint8(i+2)))==='Exif'){
            const gps=parseEXIFgps(e.target.result,off+2,len-2);
            if(gps){if($('lf-lat'))$('lf-lat').value=gps.lat.toFixed(6);if($('lf-lng'))$('lf-lng').value=gps.lng.toFixed(6);const s=$('lf-status');if(s){s.textContent='✅ GPS from photo: '+gps.lat.toFixed(5)+', '+gps.lng.toFixed(5);s.style.color='var(--green)';}return;}
          }
          off+=len;
        } else if((mk&0xFF00)===0xFF00){off+=v.getUint16(off);}else break;
      }
    }catch(e2){}
    const s=$('lf-status');if(s){s.textContent='No GPS found in this photo. Enter coordinates manually.';s.style.color='var(--red)';}
  };
  r.readAsArrayBuffer(file);
}

function parseEXIFgps(buf,start,len){
  try{
    const v=new DataView(buf,start);
    const le=v.getUint16(6)===0x4949;
    const ifd=v.getUint32(10,le)+6;
    const n=v.getUint16(ifd,le);
    for(let i=0;i<n;i++){
      const o=ifd+2+i*12;
      if(v.getUint16(o,le)===0x8825){
        const go=v.getUint32(o+8,le)+6;
        const gn=v.getUint16(go,le);
        let latR='N',lngR='E',lat=null,lng=null;
        for(let j=0;j<gn;j++){
          const ko=go+2+j*12;const kt=v.getUint16(ko,le);
          if(kt===1)latR=String.fromCharCode(v.getUint8(ko+8));
          if(kt===3)lngR=String.fromCharCode(v.getUint8(ko+8));
          if(kt===2||kt===4){
            const do2=v.getUint32(ko+8,le)+6;
            const deg=v.getUint32(do2,le)/v.getUint32(do2+4,le);
            const min=v.getUint32(do2+8,le)/v.getUint32(do2+12,le);
            const sec=v.getUint32(do2+16,le)/v.getUint32(do2+20,le);
            if(kt===2)lat=deg+min/60+sec/3600;else lng=deg+min/60+sec/3600;
          }
        }
        if(lat&&lng)return{lat:latR==='S'?-lat:lat,lng:lngR==='W'?-lng:lng};
      }
    }
  }catch(e){}return null;
}

function exportCSV(data, filename, cols){
  const header=cols.map(c=>c.label).join(',');
  const rows=data.map(row=>cols.map(c=>{
    const v=(row[c.key]||'').toString().replace(/"/g,'""');
    return v.includes(',')||v.includes('"')||v.includes('\n')?`"${v}"`:v;
  }).join(','));
  const csv='\uFEFF'+header+'\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=filename+'_'+today()+'.csv';a.click();
  toast('📥 '+filename+'.csv exported');
}

function mergeLeads(){
  // Находим дубли по названию компании
  const groups={};
  db.leads.forEach(l=>{const key=(l.company||'').toLowerCase().trim();if(!key)return;if(!groups[key])groups[key]=[];groups[key].push(l);});
  const dups=Object.entries(groups).filter(([,arr])=>arr.length>1);
  if(!dups.length){toast('No duplicate leads found');return;}
  let html='<div style="font-size:13px;color:var(--text-m);margin-bottom:12px">Found '+dups.length+' duplicate group(s). Select which to keep:</div>';
  dups.forEach(([key,arr],gi)=>{
    html+=`<div style="margin-bottom:14px;padding:10px;border:1px solid var(--bdr);border-radius:var(--r)">
      <div style="font-weight:700;margin-bottom:6px">${arr[0].company} (${arr.length} duplicates)</div>
      ${arr.map((l,i)=>`<label style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;cursor:pointer">
        <input type="radio" name="mg-${gi}" value="${l.id}" ${i===0?'checked':''} style="margin-top:3px">
        <div style="font-size:12px"><strong>${l.status}</strong> · ${l.contact||'—'} · ${l.source||'—'} · ${l.product||'—'} · ${timeAgo(l.created)}</div>
      </label>`).join('')}
    </div>`;
  });
  showModal('Merge Duplicate Leads',html,async()=>{
    for(let gi=0;gi<dups.length;gi++){
      const [,arr]=dups[gi];
      const sel=document.querySelector(`input[name="mg-${gi}"]:checked`)?.value;
      if(!sel)continue;
      for(const l of arr){
        if(l.id!==sel){await del('leads',l.id);db.leads=db.leads.filter(x=>x.id!==l.id);}
      }
    }
    toast('Duplicates merged');updateBadges();renderLeads();
  },'Merge');
}

function trashLead(id){

    <div class="fg"><label class="fl">Sales Rep</label><select class="fc" id="lf2-ag">${AGENTS().map(a=>`<option ${(l.agent||me?.name)===a?'selected':''}>${a}</option>`).join('')}</select></div>
  `,async()=>{
    const row={...(l||{}),id:id||uid(),company:$('lf2-co').value,contact:$('lf2-ct').value,phone:$('lf2-ph').value,email:$('lf2-em').value,source:$('lf2-src').value,status:$('lf2-st').value,product:$('lf2-pr').value,budget:+$('lf2-bu').value||0,notes:$('lf2-no').value,agent:$('lf2-ag').value,created:l.created||today()};
    await persist('leads',row);
    if(id)Object.assign(db.leads.find(x=>x.id===id)||{},row);else db.leads.push(row);
    toast('Lead saved');updateBadges();renderLeads();
  },'Save',id?[
    ...(()=>{const l2=db.leads.find(x=>x.id===id);const existCo=l2&&db.companies.find(c=>(c.name||'').toLowerCase()===(l2.company||'').toLowerCase());return existCo?[{label:'Convert → Deal',success:true,action:()=>{closeModal();convertLeadToDeal(id,existCo.id);}}]:[{label:'Convert → Company',success:true,action:()=>{closeModal();convertLead(id);}}];})()
  ]:undefined);
}

function openTaskFormOnDay(date){
  openTaskForm(null,null,date);
}

function lf2CoCheck(val){
  const warn=$('lf2-co-warn');if(!warn)return;
  const co=val.trim().length>1?db.companies.find(c=>(c.name||'').toLowerCase()===val.trim().toLowerCase()):null;
  if(co){warn.innerHTML=`⚠ Клиент уже в базе — <strong>${co.name}</strong>. Конвертируй в сделку.`;warn.style.display='block';}
  else{warn.style.display='none';}
}

// ─── CONTRACTS ───────────────────────────────────────────────
let _conSearch='',_conStatus='';
function renderContracts(){
  $('tb-right').innerHTML=`
    <div style="position:relative">
      <i class="ti ti-search" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-l);font-size:13px;pointer-events:none"></i>
      <input class="fc" style="padding-left:28px;width:150px;height:32px" placeholder="Search contracts…" value="${_conSearch}" oninput="_conSearch=this.value;renderContracts()">
    </div>
    <select class="btn" onchange="_conStatus=this.value;renderContracts()">
      <option value="">All statuses</option>
      ${['Draft','Signed','Active','Completed','Expired'].map(s=>`<option ${_conStatus===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <button class="btn" onclick="exportContracts()" title="Export CSV"><i class="ti ti-download"></i></button>
    <button class="btn btn-primary" onclick="openContractForm()"><i class="ti ti-plus"></i> Contract</button>
    <button class="tb-icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>`;
  const sc={Active:'b-green',Draft:'b-gray',Signed:'b-blue',Completed:'b-gray',Expired:'b-red'};
  const q=_conSearch,st=_conStatus;
  const list=db.contracts.filter(cn=>(!st||cn.status===st)&&(!q||_matches(cn.company,q)||_matches(cn.subject,q)||_matches(cn.number,q))).sort((a,b)=>(b.created||'').localeCompare(a.created||''));
  $('page').innerHTML=`<div class="page-pad"><div class="card" style="overflow:hidden">
    <table class="tbl tbl-hover"><thead><tr><th>Company</th><th>Type</th><th>Subject</th><th>Amount</th><th>Signed</th><th>Delivery</th><th>Status</th></tr></thead>
    <tbody>${list.map(cn=>`<tr onclick="go('companies');openCo('${cn.company_id}')">
      <td><strong>${cn.company}</strong></td><td style="color:var(--text-m)">${cn.type||'—'}</td>
      <td>${cn.subject||cn.number||'—'}</td><td style="font-weight:600">${fmtUSD(cn.amount)}</td>
      <td style="color:var(--text-m)">${fmtD(cn.signed_date)}</td><td style="color:var(--text-m)">${fmtD(cn.delivery_date)}</td>
      <td><span class="badge ${sc[cn.status]||'b-gray'}">${cn.status||'Draft'}</span></td>
    </tr>`).join('')||'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-m)">No contracts</td></tr>'}
    </tbody></table>
  </div></div>`;
}

function openContractForm(coId,cid){
  const c=cid?db.contracts.find(x=>x.id===cid):{};
  const co=coId?db.companies.find(x=>x.id===coId):null;
  showModal((cid?'Edit':'Add')+' Contract',`
    <div class="fg"><label class="fl">Company</label>${co?`<input class="fc" value="${co.name}" readonly><input type="hidden" id="cof-coid" value="${coId}">`:
    `<select class="fc" id="cof-coid"><option value="">—</option>${db.companies.map(x=>`<option value="${x.id}">${x.name}</option>`).join('')}</select>`}</div>
    <div class="fr"><div class="fg"><label class="fl">Type</label><select class="fc" id="cof-type">${['Sale','Lease','Service','Supply','Other'].map(t=>`<option ${c.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="fg"><label class="fl">Number</label><input class="fc" id="cof-num" value="${c.number||''}"></div></div>
    <div class="fg"><label class="fl">Subject</label><input class="fc" id="cof-sub" value="${c.subject||''}"></div>
    <div class="fr"><div class="fg"><label class="fl">Amount ($)</label><input class="fc" id="cof-amt" type="number" value="${c.amount||''}"></div><div class="fg"><label class="fl">Status</label><select class="fc" id="cof-st">${['Draft','Signed','Active','Completed','Expired'].map(s=>`<option ${(c.status||'Draft')===s?'selected':''}>${s}</option>`).join('')}</select></div></div>
    <div class="fr"><div class="fg"><label class="fl">Signed Date</label><input class="fc" id="cof-sd" type="date" value="${c.signed_date||''}"></div><div class="fg"><label class="fl">Delivery Date</label><input class="fc" id="cof-dd" type="date" value="${c.delivery_date||''}"></div></div>
    <div class="fg"><label class="fl">Notes</label><textarea class="fc" id="cof-no" rows="2">${c.notes||''}</textarea></div>
  `,async()=>{
    const coid=coId||$('cof-coid')?.value;const coObj=db.companies.find(x=>x.id===coid);
    const row={...(c||{}),id:cid||uid(),company_id:coid,company:coObj?.name||'',type:$('cof-type').value,number:$('cof-num').value,subject:$('cof-sub').value,amount:+$('cof-amt').value||0,status:$('cof-st').value,signed_date:$('cof-sd').value,delivery_date:$('cof-dd').value,notes:$('cof-no').value,agent:me?.name||'',created:c.created||today()};
    await persist('contracts',row);
    if(cid)Object.assign(db.contracts.find(x=>x.id===cid)||{},row);else db.contracts.push(row);
    toast('Contract saved');if(coPage===coid)openCo(coid);else renderContracts();
  });
}

// ─── PARTS FORECAST ─────────────────────────────────────────
let _partsSearch='',_partsBrand='';
function renderParts(){
  const allBrands=[...new Set(db.fleet.filter(f=>f.condition!=='Competitor').map(f=>f.brand).filter(Boolean))].sort();
  $('tb-right').innerHTML=`
    <div style="position:relative">
      <i class="ti ti-search" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text-l);font-size:13px;pointer-events:none"></i>
      <input class="fc" style="padding-left:28px;width:150px;height:32px" placeholder="Search company…" value="${_partsSearch}" oninput="_partsSearch=this.value;renderParts()">
    </div>
    <select class="btn" onchange="_partsBrand=this.value;renderParts()">
      <option value="">All brands</option>
      ${allBrands.map(b=>`<option ${_partsBrand===b?'selected':''}>${b}</option>`).join('')}
    </select>
    <button class="btn" onclick="exportParts()" title="Export CSV"><i class="ti ti-download"></i></button>
    <button class="tb-icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>`;
  const fleet=db.fleet.filter(f=>f.condition!=='Competitor'&&(!_partsBrand||f.brand===_partsBrand)&&(!_partsSearch||_matches(f.company,_partsSearch)||_matches(f.model,_partsSearch)));
  const total={parts:0,svc:0,att:0};
  fleet.forEach(u=>{const age=u.year?new Date().getFullYear()-+u.year:5;const base=Math.max(50000-age*3000,10000);total.parts+=Math.round(base*.05);total.svc+=Math.round(base*.02);total.att+=Math.round(base*.015);});
  $('page').innerHTML=`<div class="page-pad">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
      <div class="metric green"><div class="metric-label">Parts & Consumables/yr</div><div class="metric-val" style="color:var(--green)">${fmtUSD(total.parts)}</div><div class="metric-sub">${fleet.length} units</div></div>
      <div class="metric amber"><div class="metric-label">Service Contracts/yr</div><div class="metric-val" style="color:var(--amber)">${fmtUSD(total.svc)}</div></div>
      <div class="metric"><div class="metric-label">Attachments & Tools/yr</div><div class="metric-val">${fmtUSD(total.att)}</div></div>
    </div>
    <div class="card" style="overflow:hidden">
      <table class="tbl tbl-hover"><thead><tr><th>Company</th><th>Equipment</th><th>Age</th><th>Condition</th><th>Parts/yr</th><th>Service/yr</th><th>Total/yr</th></tr></thead>
      <tbody>${fleet.map(u=>{const age=u.year?new Date().getFullYear()-+u.year:5;const base=Math.max(50000-age*3000,10000);const parts=Math.round(base*.05),svc=Math.round(base*.02);return`<tr onclick="go('companies');openCo('${u.company_id}')"><td>${u.company}</td><td><strong>${u.brand} ${u.model}</strong></td><td style="color:${age>10?'var(--red)':age>5?'var(--amber)':'var(--green)'}">${age}y</td><td><span class="badge ${{New:'b-blue',Excellent:'b-green',Good:'b-green',Fair:'b-amber',Poor:'b-red'}[u.condition]||'b-gray'}">${u.condition||'Good'}</span></td><td>${fmtUSD(parts)}</td><td>${fmtUSD(svc)}</td><td style="font-weight:700">${fmtUSD(parts+svc)}</td></tr>`;}).join('')||'<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-m)">No fleet recorded</td></tr>'}
      </tbody></table>
    </div>
  </div>`;
}

// ─── SETTINGS ────────────────────────────────────────────────
function renderSettings(){
  $('tb-right').innerHTML='<button class="btn btn-primary" onclick="openUserForm()"><i class="ti ti-plus"></i> Add User</button><button class="tb-icon-btn" onclick="toggleNotif()"><i class="ti ti-bell"></i><span id="notif-dot" class="notif-dot" style="display:none"></span></button>';
  setTimeout(checkAIKey,100);
  $('page').innerHTML=`<div class="page-pad" style="max-width:720px">
    <!-- Data controls -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><div class="card-title"><i class="ti ti-database"></i> Data</div></div>
      <div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="refreshData()"><i class="ti ti-refresh"></i> Refresh Data</button>
        <button class="btn" onclick="exportData()"><i class="ti ti-download"></i> Export to JSON</button>
        <div style="font-size:12px;color:var(--text-m);margin-left:auto;align-self:center">
          ${db.companies.length} companies · ${db.deals.length} deals · ${db.activities.filter(isRealAct).length} activities
        </div>
      </div>
    </div>

    <!-- Invite link -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><div class="card-title"><i class="ti ti-link"></i> Invite Link</div></div>
      <div class="card-body">
        <div style="font-size:13px;color:var(--text-m);margin-bottom:8px">Share this link — opens CRM on any device without setup screen</div>
        <div style="display:flex;gap:8px">
          <input class="fc" id="inv-link" value="${location.href.split('?')[0]}?api=${encodeURIComponent(API)}" readonly style="font-size:11px;font-family:monospace">
          <button class="btn" onclick="navigator.clipboard.writeText($('inv-link').value);toast('Link copied!')"><i class="ti ti-copy"></i> Copy</button>
        </div>
      </div>
    </div>

    <!-- Claude AI -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><div class="card-title"><i class="ti ti-sparkles" style="color:var(--purple)"></i> Claude AI Integration</div></div>
      <div class="card-body">
        <div style="font-size:13px;color:var(--text-m);margin-bottom:10px">AI note analysis — automatically extracts next steps, sentiment and key facts from call notes.</div>
        <div id="ai-key-status" style="margin-bottom:10px;font-size:13px"></div>
        <div style="display:flex;gap:8px">
          <input class="fc" id="ai-key-inp" type="password" placeholder="sk-ant-api03-…" style="flex:1">
          <button class="btn btn-primary" onclick="saveAIKey()"><i class="ti ti-check"></i> Save Key</button>
          <a href="https://console.anthropic.com/keys" target="_blank" class="btn"><i class="ti ti-external-link"></i> Get key</a>
        </div>
      </div>
    </div>

    <!-- Users -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head"><div class="card-title">CRM Users</div></div>
      <table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Last Login</th><th>Status</th><th></th></tr></thead>
      <tbody>${db.users.map(u=>`<tr>
        <td><div style="display:flex;align-items:center;gap:8px"><div class="av av-sm ${avCls(u.name)}">${ini(u.name)}</div><strong>${u.name}</strong></div></td>
        <td><span class="badge ${u.role==='manager'?'b-green':'b-blue'}">${u.role==='manager'?'Sales Manager':'Sales Rep'}</span></td>
        <td style="color:var(--text-m)">${u.last_login?fmtD(u.last_login):'Never'}</td>
        <td><span class="badge ${u.active?'b-green':'b-red'}">${u.active?'Active':'Blocked'}</span></td>
        <td><button class="btn btn-xs" onclick="openUserForm('${u.id}')"><i class="ti ti-edit"></i></button></td>
      </tr>`).join('')}</tbody>
    </table>
    </div>

    <!-- Access rights -->
    <div class="card">
      <div class="card-head"><div class="card-title">Access Rights</div></div>
      <div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div><div style="font-weight:700;color:var(--blue);margin-bottom:8px">Sales Rep</div>
          ${['Own deals and tasks','Own calendar','All companies and contacts','Fleet','Parts forecast'].map(x=>`<div style="font-size:12px;color:var(--text-m);padding:3px 0">✓ ${x}</div>`).join('')}
          ${['Others\' deals','Team reports','User management'].map(x=>`<div style="font-size:12px;color:var(--text-l);padding:3px 0">✗ ${x}</div>`).join('')}
        </div>
        <div><div style="font-weight:700;color:var(--green);margin-bottom:8px">Sales Manager</div>
          ${['All deals from all reps','All team tasks','Full reports','All companies and contacts','Fleet','User management'].map(x=>`<div style="font-size:12px;color:var(--text-m);padding:3px 0">✓ ${x}</div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

function openUserForm(id){
  const u=id?db.users.find(x=>x.id===id):{};
  showModal((id?'Edit':'Add')+' User',`
    <div class="fg"><label class="fl">Full Name *</label><input class="fc" id="uf-name" value="${u.name||''}"></div>
    <div class="fg"><label class="fl">Role</label><select class="fc" id="uf-role"><option value="rep" ${(u.role||'rep')==='rep'?'selected':''}>Sales Rep</option><option value="manager" ${u.role==='manager'?'selected':''}>Sales Manager</option></select></div>
    <div class="fg"><label class="fl">Password ${id?'(leave blank to keep)':''} *</label><input class="fc" id="uf-pass" type="password" placeholder="${id?'New password…':'Min 4 chars'}"></div>
    <div class="fg"><label class="fl">Status</label><select class="fc" id="uf-active"><option value="true" ${u.active!==false?'selected':''}>Active</option><option value="false" ${u.active===false?'selected':''}>Blocked</option></select></div>
  `,async()=>{
    const name=($('uf-name').value||'').trim();if(!name){alert('Enter name');return false;}
    const pass=$('uf-pass').value;
    if(!id&&pass.length<4){alert('Password must be at least 4 characters');return false;}
    const row={...(u||{}),id:id||uid(),name,role:$('uf-role').value||'rep',active:$('uf-active').value!=='false'};
    if(pass.length>=4)row.password_hash=simpleHash(pass);
    await persist('users',row);
    if(id)Object.assign(db.users.find(x=>x.id===id)||{},row);else db.users.push(row);
    toast('User saved');renderSettings();
  });
}

async function refreshData(){
  toast('Refreshing…');
  _dataLoaded=false;
  try{await loadAll();toast('✅ Data refreshed — '+db.companies.length+' companies loaded');}
  catch(e){toast('Error: '+e.message);}
  if(page==='settings')renderSettings();
  else go(page);
}

function exportData(){
  const data={companies:db.companies,contacts:db.contacts,deals:db.deals,activities:db.activities.filter(isRealAct),tasks:db.tasks,fleet:db.fleet,exported:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wayland-crm-'+today()+'.json';a.click();
  toast('Exported');
}

function saveAIKey(){
  const key=($('ai-key-inp')?.value||'').trim();
  if(!key.startsWith('sk-ant-')){toast('Invalid key — must start with sk-ant-');return;}
  apiCall({action:'setApiKey',key}).then(()=>{toast('✅ API key saved');checkAIKey();}).catch(e=>toast('Error: '+e.message));
}

async function checkAIKey(){
  try{const r=await apiCall({action:'hasApiKey'});const el=$('ai-key-status');if(el)el.innerHTML=r.has?'<span style="color:var(--green)"><i class="ti ti-check"></i> API key configured — AI analysis enabled</span>':'<span style="color:var(--text-m)">No API key set</span>';}catch(e){}
}

function toggleMobSearch(){
  const wrap=document.querySelector('.tb-search');
  if(!wrap)return;
  const visible=wrap.style.display!=='none'&&wrap.style.display!=='';
  if(visible){wrap.style.display='none';}
  else{wrap.style.display='block';wrap.style.position='fixed';wrap.style.top='8px';wrap.style.left='60px';wrap.style.right='50px';wrap.style.zIndex='50';setTimeout(()=>$('s-input')?.focus(),50);}
}

function bnClick(el){
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  // Sync sidebar
  const p=el.dataset.page;
  if(p){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.page===p));}
}

// Update bottom nav badge
const _origUpdateBadges=updateBadges;
// Override updateBadges to also update bn-pipe
const _ub=updateBadges;

// ─── INIT ────────────────────────────────────────────────────
init();
</script>
