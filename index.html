        <div><div style="font-weight:700;color:var(--blue);margin-bottom:8px">Sales Rep</div>${['Own deals and tasks','Own calendar','All companies and contacts','Fleet','Parts forecast'].map(x=>`<div style="font-size:12px;color:var(--text-m);padding:3px 0">✓ ${x}</div>`).join('')}${['Others\' deals','Team reports','Operations & import','User management'].map(x=>`<div style="font-size:12px;color:var(--text-l);padding:3px 0">✗ ${x}</div>`).join('')}</div>
        <div><div style="font-weight:700;color:var(--green);margin-bottom:8px">Sales Manager</div>${['All deals from all reps','All team tasks','Shared calendar','All companies and contacts','Fleet','Reports across entire team','Operations & import','User management'].map(x=>`<div style="font-size:12px;color:var(--text-m);padding:3px 0">✓ ${x}</div>`).join('')}</div>
      </div>
    </div>
  </div>`;
}

function openUserForm(id){
  const u=id?db.users.find(x=>x.id===id):{};
  showModal((id?'Edit':'Add')+' User',`
    <div class="fg"><label class="fl">Full Name *</label><input class="fc" id="uf-name" value="${u.name||''}"></div>
    <div class="fg"><label class="fl">Role</label><select class="fc" id="uf-role"><option value="rep" ${(u.role||'rep')==='rep'?'selected':''}>Sales Rep</option><option value="manager" ${u.role==='manager'?'selected':''}>Sales Manager</option></select></div>
    <div class="fg"><label class="fl">Password ${id?'(blank = keep)':''} *</label><input class="fc" id="uf-pass" type="password" placeholder="${id?'New password...':'Min 4 chars'}"></div>
    <div class="fg"><label class="fl">Status</label><select class="fc" id="uf-active"><option value="true" ${u.active!==false&&u.active!=='false'?'selected':''}>Active</option><option value="false" ${u.active===false||u.active==='false'?'selected':''}>Blocked</option></select></div>
  `,async()=>{
    const name=($('uf-name').value||'').trim();if(!name){alert('Enter name');return false;}
    const pass=$('uf-pass').value;
    if(!id&&pass.length<4){alert('Password min 4 chars');return false;}
    const row={...(u||{}),id:id||uid(),name,role:$('uf-role').value||'rep',active:$('uf-active').value!=='false'};
    if(pass.length>=4)row.password_hash=simpleHash(pass);
    await persist('users',row);
    if(id)Object.assign(db.users.find(x=>x.id===id),row);else db.users.push(row);
    toast('User saved');renderSettings();
  });
}

// ═══════════════════════════════════════════════════════════
// PHOTOS
// ═══════════════════════════════════════════════════════════
function openPhotoUpload(coId){
  showModal('Upload Photo',`
    <div id="photo-drop" style="border:2px dashed var(--bdr);border-radius:var(--radius-lg);padding:32px;text-align:center;cursor:pointer;transition:all .2s" onclick="document.getElementById('photo-file-inp').click()" ondragover="event.preventDefault();this.style.borderColor='var(--blue)';this.style.background='var(--blue-lt)'" ondragleave="this.style.borderColor='';this.style.background=''" ondrop="event.preventDefault();this.style.borderColor='';this.style.background='';handlePhotoFile(event.dataTransfer.files[0],'${coId}')">
      <i class="ti ti-camera" style="font-size:40px;color:var(--blue);display:block;margin-bottom:10px"></i>
      <div style="font-weight:600;color:var(--blue)">Click or drag photo here</div>
      <div style="font-size:12px;color:var(--text-m);margin-top:4px">JPG, PNG, HEIC · any size</div>
      <input type="file" id="photo-file-inp" accept="image/*" style="display:none" onchange="handlePhotoFile(this.files[0],'${coId}')">
    </div>
    <div id="photo-status" style="margin-top:10px;font-size:12px;text-align:center;color:var(--text-m)"></div>
    <div class="fg" style="margin-top:10px"><label class="fl">Caption (optional)</label><input class="fc" id="photo-caption" placeholder="Excavator on site, Quarry entrance..."></div>
  `,null,null,true);
}

async function handlePhotoFile(file,coId){
  if(!file||!file.type.startsWith('image/'))return;
  const status=$('photo-status');
  if(status)status.innerHTML='<i class="ti ti-loader-2 spin"></i> Uploading...';
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',CLOUDINARY_PRESET);
    const r=await fetch('https://api.cloudinary.com/v1_1/'+CLOUDINARY_CLOUD+'/image/upload',{method:'POST',body:fd});
    const data=await r.json();
    if(!data.secure_url)throw new Error('Upload failed');
    const co=db.companies.find(c=>c.id===coId);
    const caption=$('photo-caption')?.value||'';
    const row={id:uid(),company_id:coId,company:co?.name||'',name:file.name,url:data.secure_url,thumb:data.secure_url.replace('/upload/','/upload/w_200,h_200,c_fill/'),caption,created:new Date().toISOString()};
    await persist('photos',row);db.photos.push(row);
    if(status)status.innerHTML='<span style="color:var(--green)">✅ Uploaded!</span>';
    toast('Photo uploaded');
    setTimeout(()=>{closeModal();if(_coPage===coId)openCompany(coId);},1000);
  }catch(e){if(status)status.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';}
}

function openPhotoViewer(url){
  showModal('Photo',`<div style="text-align:center"><img src="${url}" style="max-width:100%;max-height:65vh;border-radius:var(--radius)"></div>`,null,null,true);
}


// ═══════════════════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════════════════
async function init(){
  // Check invite link
  const urlParams=new URLSearchParams(location.search);
  const apiFromUrl=urlParams.get('api');
  if(apiFromUrl){API=decodeURIComponent(apiFromUrl);localStorage.setItem('wcrm_url',API);}

  // Load data first
  try{await loadAll();}catch(e){console.warn('Initial load failed:',e.message);}

  // Check session
  const session=localStorage.getItem('wcrm_session');
  if(session){
    try{
      const s=JSON.parse(session);
      const user=db.users.find(u=>u.id===s.id&&u.name===s.name);
      if(user&&user.active!==false&&user.active!=='false'){
        currentUser=user;startApp();return;
      }
    }catch(e){}
    localStorage.removeItem('wcrm_session');
  }

  // If no users yet, show simple connect screen
  $('login-screen').style.display='flex';
}

function saveAIKey() {
  const key = $('ai-key-input')?.value.trim();
  if(!key.startsWith('sk-ant-')) { toast('Invalid key format. Must start with sk-ant-'); return; }
  apiCall({action:'setApiKey', key}).then(()=>{
    toast('✅ API key saved securely');
    checkAIKey();
  }).catch(e=>toast('Error: '+e.message));
}

async function checkAIKey() {
  try {
    const r = await apiCall({action:'hasApiKey'});
    const el = $('ai-key-status');
    if(el) el.innerHTML = r.has
      ? '<span style="color:var(--green)">✅ API key configured</span>'
      : '<span style="color:var(--text-m)">No API key set</span>';
  } catch(e) {}
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();$('search-input')?.focus();}
  if(e.key==='Escape'){closeModal();hideSearchResults();}
});

// Start
init();

</script>
